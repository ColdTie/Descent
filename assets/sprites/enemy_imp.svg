<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<defs>
  <linearGradient id="bd" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#E02020"/><stop offset="45%" stop-color="#B01010"/><stop offset="100%" stop-color="#701010"/>
  </linearGradient>
  <linearGradient id="wg" x1="10%" y1="0%" x2="90%" y2="100%">
    <stop offset="0%" stop-color="#881010"/><stop offset="50%" stop-color="#580808"/><stop offset="100%" stop-color="#280404"/>
  </linearGradient>
  <linearGradient id="hr" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#200808"/><stop offset="100%" stop-color="#080202"/>
  </linearGradient>
  <radialGradient id="ey" cx="40%" cy="35%">
    <stop offset="0%" stop-color="#FFD840"/><stop offset="50%" stop-color="#E0A000"/><stop offset="100%" stop-color="#804000"/>
  </radialGradient>
</defs>

<ellipse cx="48" cy="93" rx="16" ry="3.5" fill="#000" opacity="0.32"/>

<!-- TAIL curled -->
<path d="M64,78 Q82,74 84,62 Q86,50 76,48 Q70,47 70,54" stroke="#981010" stroke-width="5" fill="none" stroke-linecap="round"/>
<path d="M64,78 Q82,74 84,62 Q86,50 76,48 Q70,47 70,54" stroke="#C01818" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
<!-- Tail tip spade -->
<polygon points="76,54 70,60 82,60" fill="#981010"/>
<polygon points="76,54 71,59 81,59" fill="#C01818" opacity="0.6"/>

<!-- WINGS (leathery, swept back) -->
<!-- Left wing -->
<path d="M30,44 C8,34 2,20 6,10 C14,26 22,36 30,44" fill="url(#wg)"/>
<path d="M30,44 C12,28 8,14 10,6 C16,22 24,34 30,44" fill="#700C0C" opacity="0.5"/>
<!-- Wing bone lines -->
<path d="M30,44 C18,30 12,18 8,10" stroke="#881010" stroke-width="1.5" fill="none" opacity="0.8"/>
<path d="M30,44 C20,26 18,14 14,8" stroke="#A01414" stroke-width="1" fill="none" opacity="0.6"/>
<!-- Right wing -->
<path d="M66,44 C88,34 94,20 90,10 C82,26 74,36 66,44" fill="url(#wg)"/>
<path d="M66,44 C84,28 88,14 86,6 C80,22 72,34 66,44" fill="#700C0C" opacity="0.5"/>
<path d="M66,44 C78,30 84,18 88,10" stroke="#881010" stroke-width="1.5" fill="none" opacity="0.8"/>
<path d="M66,44 C76,26 78,14 82,8" stroke="#A01414" stroke-width="1" fill="none" opacity="0.6"/>

<!-- LEGS short stubby -->
<rect x="33" y="74" width="12" height="16" rx="5" fill="url(#bd)"/>
<rect x="51" y="74" width="12" height="16" rx="5" fill="url(#bd)"/>
<rect x="34" y="76" width="4" height="10" rx="2" fill="#E03030" opacity="0.3"/>
<!-- Cloven hooves -->
<path d="M33,88 Q34,93 39,92 Q44,92 45,88" fill="#200808"/>
<path d="M51,88 Q52,93 57,92 Q62,92 63,88" fill="#200808"/>

<!-- TORSO compact -->
<path d="M28,44 C26,48 25,58 26,75 L70,75 C71,58 70,48 68,44 Z" fill="url(#bd)"/>
<ellipse cx="38" cy="59" rx="7" ry="9" fill="#980E0E" opacity="0.3"/>
<ellipse cx="58" cy="59" rx="7" ry="9" fill="#980E0E" opacity="0.3"/>
<rect x="46" y="46" width="4" height="28" fill="#800808" opacity="0.25"/>

<!-- ARMS short with claws -->
<rect x="14" y="40" width="16" height="18" rx="7" fill="url(#bd)"/>
<rect x="66" y="40" width="16" height="18" rx="7" fill="url(#bd)"/>
<!-- Claws left -->
<path d="M14,56 L9,52 M14,58 L8,57 M14,60 L9,63" stroke="#200808" stroke-width="2" fill="none" stroke-linecap="round"/>
<!-- Claws right -->
<path d="M82,56 L87,52 M82,58 L88,57 M82,60 L87,63" stroke="#200808" stroke-width="2" fill="none" stroke-linecap="round"/>

<!-- NECK -->
<rect x="40" y="32" width="16" height="14" rx="5" fill="url(#bd)"/>

<!-- HEAD round and big -->
<ellipse cx="48" cy="26" rx="22" ry="20" fill="url(#bd)"/>
<!-- Head shading -->
<ellipse cx="58" cy="28" rx="10" ry="12" fill="#900E0E" opacity="0.25"/>
<ellipse cx="40" cy="20" rx="9" ry="8" fill="#E04040" opacity="0.18"/>

<!-- HORNS -->
<path d="M34,8 C30,0 26,-2 28,6 C30,12 36,14 38,18" fill="url(#hr)"/>
<path d="M34,8 C32,2 30,0 32,6 C34,10 36,12 38,18" fill="#2A0808" opacity="0.5"/>
<path d="M62,8 C66,0 70,-2 68,6 C66,12 60,14 58,18" fill="url(#hr)"/>
<path d="M62,8 C64,2 66,0 64,6 C62,10 60,12 58,18" fill="#2A0808" opacity="0.5"/>

<!-- EARS pointed -->
<path d="M26,22 Q16,16 18,28 Q22,36 28,32 Z" fill="url(#bd)"/>
<path d="M70,22 Q80,16 78,28 Q74,36 68,32 Z" fill="url(#bd)"/>

<!-- EYES big yellow -->
<ellipse cx="39" cy="27" rx="8" ry="7" fill="#100404"/>
<ellipse cx="39" cy="27" rx="6" ry="5.5" fill="#CC8000"/>
<ellipse cx="39" cy="27" rx="4" ry="4" fill="url(#ey)"/>
<circle cx="39" cy="27" r="2.2" fill="#C89800"/>
<circle cx="39" cy="27" r="1.2" fill="#0A0202"/>
<!-- Slit pupil -->
<rect x="38.4" y="24.5" width="1.2" height="5" rx="0.6" fill="#0A0202"/>
<circle cx="37.5" cy="25.5" r="0.9" fill="white" opacity="0.75"/>

<ellipse cx="57" cy="27" rx="8" ry="7" fill="#100404"/>
<ellipse cx="57" cy="27" rx="6" ry="5.5" fill="#CC8000"/>
<ellipse cx="57" cy="27" rx="4" ry="4" fill="url(#ey)"/>
<circle cx="57" cy="27" r="2.2" fill="#C89800"/>
<circle cx="57" cy="27" r="1.2" fill="#0A0202"/>
<rect x="56.4" y="24.5" width="1.2" height="5" rx="0.6" fill="#0A0202"/>
<circle cx="55.5" cy="25.5" r="0.9" fill="white" opacity="0.75"/>

<!-- BROW ridge furrowed mean -->
<rect x="30" y="20" width="12" height="3.5" rx="1.5" fill="#280808" transform="rotate(-14,36,22)"/>
<rect x="54" y="20" width="12" height="3.5" rx="1.5" fill="#280808" transform="rotate(14,60,22)"/>

<!-- NOSE flat wide -->
<ellipse cx="48" cy="33" rx="5" ry="3.5" fill="#880808"/>
<circle cx="45.5" cy="34.5" r="1.4" fill="#600808"/>
<circle cx="50.5" cy="34.5" r="1.4" fill="#600808"/>

<!-- MOUTH grin wide -->
<path d="M32,38 Q48,46 64,38" fill="#480808"/>
<path d="M32,38 Q48,44 64,38" stroke="#280404" stroke-width="1.5" fill="none"/>
<!-- Fangs -->
<rect x="38" y="38" width="3" height="5" rx="1" fill="#E8E0C0"/>
<rect x="44" y="39" width="3" height="4" rx="1" fill="#E0D8B8"/>
<rect x="50" y="39" width="3" height="4" rx="1" fill="#E0D8B8"/>
<rect x="56" y="38" width="3" height="5" rx="1" fill="#E8E0C0"/>
</svg>
