<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Ground shadow -->
  <ellipse cx="48" cy="93" rx="16" ry="4" fill="#000" opacity="0.32"/>

  <!-- TAIL — arcing behind -->
  <path d="M58,68 Q72,60 74,48 Q76,36 66,34" stroke="#8A0E0E" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M58,68 Q72,60 74,48 Q76,36 66,34" stroke="#C41818" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Tail barb / diamond tip -->
  <polygon points="66,30 63,35 69,35" fill="#A01010"/>
  <polygon points="66,30 64,33 68,33" fill="#C82020"/>

  <!-- WINGS — left and right -->
  <path d="M30,36 Q10,20 8,38 Q8,50 24,48 Z" fill="#5A0808" opacity="0.85"/>
  <path d="M30,36 Q14,26 12,42" stroke="#7A1010" stroke-width="1.2" fill="none"/>
  <path d="M30,36 Q18,30 14,44" stroke="#7A1010" stroke-width="0.8" fill="none"/>
  <!-- Wing bone -->
  <path d="M30,36 Q12,22 10,38" stroke="#8A1818" stroke-width="1.5" fill="none" opacity="0.6"/>

  <path d="M66,36 Q86,20 88,38 Q88,50 72,48 Z" fill="#5A0808" opacity="0.85"/>
  <path d="M66,36 Q82,26 84,42" stroke="#7A1010" stroke-width="1.2" fill="none"/>
  <path d="M66,36 Q78,30 82,44" stroke="#7A1010" stroke-width="0.8" fill="none"/>
  <path d="M66,36 Q84,22 86,38" stroke="#8A1818" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- LEGS — short digitigrade -->
  <rect x="32" y="66" width="11" height="20" rx="4" fill="#A01010"/>
  <rect x="53" y="66" width="11" height="20" rx="4" fill="#A01010"/>
  <!-- Clawed feet -->
  <path d="M31,86 L27,93 M34,87 L32,94 M38,87 L38,94" stroke="#7A0808" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M65,86 L69,93 M62,87 L64,94 M58,87 L58,94" stroke="#7A0808" stroke-width="2.5" stroke-linecap="round"/>

  <!-- BODY — hunched torso -->
  <ellipse cx="48" cy="56" rx="18" ry="16" fill="#B81818"/>
  <ellipse cx="48" cy="52" rx="14" ry="10" fill="#C82020"/>
  <ellipse cx="44" cy="50" rx="8" ry="7" fill="#D02828" opacity="0.4"/>
  <!-- Belly bumps -->
  <ellipse cx="42" cy="59" rx="5" ry="4" fill="#A01010" opacity="0.4"/>
  <ellipse cx="54" cy="59" rx="5" ry="4" fill="#A01010" opacity="0.4"/>

  <!-- ARMS — clawed -->
  <rect x="14" y="42" width="16" height="18" rx="7" fill="#B01414"/>
  <rect x="14" y="42" width="5" height="18" rx="4" fill="#C82020" opacity="0.3"/>
  <rect x="66" y="42" width="16" height="18" rx="7" fill="#B01414"/>
  <!-- Clawed hands -->
  <ellipse cx="20" cy="62" rx="7" ry="5.5" fill="#9A1010"/>
  <ellipse cx="76" cy="62" rx="7" ry="5.5" fill="#9A1010"/>
  <!-- Left claws -->
  <path d="M14,60 L10,67 M17,62 L14,69 M21,62 L20,69" stroke="#7A0808" stroke-width="2" stroke-linecap="round"/>
  <!-- Right claws -->
  <path d="M82,60 L86,67 M79,62 L82,69 M75,62 L76,69" stroke="#7A0808" stroke-width="2" stroke-linecap="round"/>

  <!-- NECK -->
  <rect x="40" y="34" width="16" height="12" rx="5" fill="#B01414"/>

  <!-- HEAD -->
  <ellipse cx="48" cy="24" rx="17" ry="16" fill="#C41818"/>
  <ellipse cx="53" cy="26" rx="10" ry="11" fill="#901010" opacity="0.3"/>
  <ellipse cx="43" cy="20" rx="9" ry="8" fill="#D42424" opacity="0.25"/>

  <!-- SMALL HORNS -->
  <polygon points="34,14 31,4 38,12" fill="#220404"/>
  <polygon points="34,14 32,6 37,12" fill="#380808"/>
  <polygon points="62,14 65,4 58,12" fill="#220404"/>
  <polygon points="62,14 64,6 59,12" fill="#380808"/>
  <!-- Horn tips glow -->
  <circle cx="33" cy="5" r="1.5" fill="#FF2020" opacity="0.4"/>
  <circle cx="63" cy="5" r="1.5" fill="#FF2020" opacity="0.4"/>

  <!-- BROW RIDGE — mischievous -->
  <rect x="33" y="17" width="12" height="4" rx="2" fill="#8A0808" transform="rotate(-10,39,19)"/>
  <rect x="51" y="17" width="12" height="4" rx="2" fill="#8A0808" transform="rotate(10,57,19)"/>

  <!-- GLOWING YELLOW EYES -->
  <ellipse cx="39" cy="24" rx="7" ry="6" fill="#100800"/>
  <ellipse cx="39" cy="24" rx="5.5" ry="4.5" fill="#D0A000"/>
  <ellipse cx="39" cy="24" rx="3.5" ry="3" fill="#FFD000"/>
  <circle cx="39" cy="24" r="2" fill="#FFE840"/>
  <circle cx="38" cy="23" r="1" fill="#FFF" opacity="0.7"/>
  <!-- Slit pupil -->
  <rect x="38.5" y="22" width="1" height="5" rx="0.5" fill="#100800"/>

  <ellipse cx="57" cy="24" rx="7" ry="6" fill="#100800"/>
  <ellipse cx="57" cy="24" rx="5.5" ry="4.5" fill="#D0A000"/>
  <ellipse cx="57" cy="24" rx="3.5" ry="3" fill="#FFD000"/>
  <circle cx="57" cy="24" r="2" fill="#FFE840"/>
  <circle cx="56" cy="23" r="1" fill="#FFF" opacity="0.7"/>
  <rect x="56.5" y="22" width="1" height="5" rx="0.5" fill="#100800"/>

  <!-- Eye glow aura -->
  <ellipse cx="39" cy="24" rx="9" ry="7" fill="#FFD000" opacity="0.1"/>
  <ellipse cx="57" cy="24" rx="9" ry="7" fill="#FFD000" opacity="0.1"/>

  <!-- SNOUT -->
  <ellipse cx="48" cy="31" rx="6" ry="4.5" fill="#A81010"/>
  <circle cx="46" cy="32" r="1.5" fill="#800A0A"/>
  <circle cx="50" cy="32" r="1.5" fill="#800A0A"/>

  <!-- FANGED GRIN -->
  <path d="M36,35 Q48,42 60,35" stroke="#680000" stroke-width="2" fill="none"/>
  <rect x="38" y="35" width="3.5" height="5" rx="1" fill="#E8E0C0"/>
  <rect x="43" y="36" width="4" height="4" rx="1" fill="#E8E0C0"/>
  <rect x="49" y="36" width="4" height="4" rx="1" fill="#E8E0C0"/>
  <rect x="54.5" y="35" width="3.5" height="5" rx="1" fill="#E8E0C0"/>
</svg>
