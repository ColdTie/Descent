<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shadow -->
  <ellipse cx="32" cy="62" rx="12" ry="3" fill="#000" opacity="0.3"/>
  <!-- Wings - left -->
  <path d="M22,30 Q6,18 8,36 Q12,44 22,40 Z" fill="#5A0808" opacity="0.88"/>
  <path d="M22,30 Q10,24 10,36" stroke="#8A1010" stroke-width="1" fill="none"/>
  <path d="M22,30 Q14,28 12,38" stroke="#8A1010" stroke-width="0.7" fill="none"/>
  <!-- Wings - right -->
  <path d="M42,30 Q58,18 56,36 Q52,44 42,40 Z" fill="#5A0808" opacity="0.88"/>
  <path d="M42,30 Q54,24 54,36" stroke="#8A1010" stroke-width="1" fill="none"/>
  <path d="M42,30 Q50,28 52,38" stroke="#8A1010" stroke-width="0.7" fill="none"/>
  <!-- Left horn -->
  <polygon points="23,17 19,5 27,15" fill="#280808"/>
  <line x1="21" y1="7" x2="24" y2="14" stroke="#4A1010" stroke-width="1" opacity="0.7"/>
  <!-- Right horn -->
  <polygon points="41,17 45,5 37,15" fill="#280808"/>
  <line x1="43" y1="7" x2="40" y2="14" stroke="#4A1010" stroke-width="1" opacity="0.7"/>
  <!-- Head -->
  <ellipse cx="32" cy="26" rx="12" ry="11" fill="#C82020"/>
  <!-- Brow bump -->
  <ellipse cx="32" cy="18" rx="8" ry="4" fill="#A81818"/>
  <!-- Eyes - glowing yellow -->
  <ellipse cx="27" cy="25" rx="4" ry="3.5" fill="#FFD700"/>
  <ellipse cx="37" cy="25" rx="4" ry="3.5" fill="#FFD700"/>
  <circle cx="27" cy="25" r="2" fill="#1A1200"/>
  <circle cx="37" cy="25" r="2" fill="#1A1200"/>
  <rect x="25" y="24.5" width="4" height="1" rx="0.5" fill="#0A0800"/>
  <rect x="35" y="24.5" width="4" height="1" rx="0.5" fill="#0A0800"/>
  <!-- Snout -->
  <ellipse cx="32" cy="31" rx="5" ry="3" fill="#B01818"/>
  <circle cx="30" cy="31" r="1.2" fill="#880E0E"/>
  <circle cx="34" cy="31" r="1.2" fill="#880E0E"/>
  <!-- Fanged grin -->
  <path d="M25,33 Q32,39 39,33" stroke="#6A0000" stroke-width="1.5" fill="none"/>
  <rect x="27" y="33" width="2.5" height="4" rx="0.8" fill="#E8DFC0"/>
  <rect x="30.5" y="34" width="3" height="3" rx="0.8" fill="#E8DFC0"/>
  <rect x="34.5" y="33" width="2.5" height="4" rx="0.8" fill="#E8DFC0"/>
  <!-- Body small and hunched -->
  <ellipse cx="32" cy="47" rx="9" ry="11" fill="#B81818"/>
  <ellipse cx="32" cy="49" rx="6" ry="7" fill="#CC2020"/>
  <!-- Arms -->
  <rect x="14" y="39" width="10" height="9" rx="4" fill="#B01818"/>
  <rect x="40" y="39" width="10" height="9" rx="4" fill="#B01818"/>
  <!-- Left claws -->
  <path d="M14,48 L10,54 M17,49 L14,55 M20,48 L18,54" stroke="#800808" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right claws -->
  <path d="M50,48 L54,54 M47,49 L50,55 M44,48 L46,54" stroke="#800808" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M38,57 Q50,62 52,54 Q54,48 46,52" stroke="#A01414" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="48,50 52,50 49,55" fill="#A01414"/>
</svg>
