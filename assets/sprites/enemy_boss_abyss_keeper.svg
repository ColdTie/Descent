<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Void ambient glow — deep purple -->
  <circle cx="48" cy="48" r="48" fill="#200050" opacity="0.25"/>
  <circle cx="48" cy="48" r="32" fill="#380090" opacity="0.12"/>
  <!-- Ground shadow — void shimmer -->
  <ellipse cx="48" cy="93" rx="28" ry="5" fill="#100030" opacity="0.5"/>

  <!-- VOID TENDRILS — writhing shadows from body -->
  <!-- Tendrils far left -->
  <path d="M20,60 Q4,50 2,34 Q0,20 8,18" stroke="#8800CC" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M18,66 Q0,58 2,42" stroke="#6600AA" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M22,72 Q6,66 4,52 Q2,38 10,36" stroke="#7700BB" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.65"/>
  <!-- Tendril tips glow left -->
  <circle cx="8" cy="18" r="3" fill="#AA00FF" opacity="0.7"/>
  <circle cx="2" cy="42" r="2" fill="#8800DD" opacity="0.6"/>
  <circle cx="10" cy="36" r="2.5" fill="#9900EE" opacity="0.65"/>

  <!-- Tendrils far right -->
  <path d="M76,60 Q92,50 94,34 Q96,20 88,18" stroke="#8800CC" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M78,66 Q96,58 94,42" stroke="#6600AA" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M74,72 Q90,66 92,52 Q94,38 86,36" stroke="#7700BB" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.65"/>
  <!-- Tendril tips glow right -->
  <circle cx="88" cy="18" r="3" fill="#AA00FF" opacity="0.7"/>
  <circle cx="94" cy="42" r="2" fill="#8800DD" opacity="0.6"/>
  <circle cx="86" cy="36" r="2.5" fill="#9900EE" opacity="0.65"/>

  <!-- VOID LOWER BODY — shadow mass, no legs (floats) -->
  <ellipse cx="48" cy="80" rx="30" ry="18" fill="#0E0020" opacity="0.9"/>
  <ellipse cx="48" cy="80" rx="24" ry="14" fill="#160030"/>
  <!-- Void wisps from bottom -->
  <path d="M32,88 Q28,96 24,94" stroke="#5500AA" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M48,90 Q44,96 40,94" stroke="#5500AA" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M64,88 Q68,96 72,94" stroke="#5500AA" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- VOID ARMS — shadow form, twisted -->
  <path d="M22,50 Q8,44 6,56 Q4,66 14,66" stroke="#1A0040" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M22,50 Q8,44 6,56 Q4,66 14,66" stroke="#4A00A0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Left void hand — tendrils -->
  <path d="M12,64 Q6,60 4,68" stroke="#7700BB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M14,66 Q8,64 8,72" stroke="#7700BB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M16,66 Q12,70 10,76" stroke="#7700BB" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="5" cy="68" r="2" fill="#AA00FF" opacity="0.65"/>
  <circle cx="8" cy="72" r="2" fill="#9900EE" opacity="0.6"/>

  <path d="M74,50 Q88,44 90,56 Q92,66 82,66" stroke="#1A0040" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M74,50 Q88,44 90,56 Q92,66 82,66" stroke="#4A00A0" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M84,64 Q90,60 92,68" stroke="#7700BB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M82,66 Q88,64 88,72" stroke="#7700BB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M80,66 Q84,70 86,76" stroke="#7700BB" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="91" cy="68" r="2" fill="#AA00FF" opacity="0.65"/>
  <circle cx="88" cy="72" r="2" fill="#9900EE" opacity="0.6"/>

  <!-- MAIN VOID BODY — cloak of darkness -->
  <ellipse cx="48" cy="52" rx="30" ry="34" fill="#0C0020" opacity="0.95"/>
  <ellipse cx="48" cy="52" rx="24" ry="28" fill="#140030"/>
  <ellipse cx="44" cy="46" rx="14" ry="18" fill="#1A0040" opacity="0.4"/>
  <!-- Void energy swirls -->
  <path d="M32,44 Q36,52 32,60" stroke="#5500AA" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M64,44 Q60,52 64,60" stroke="#5500AA" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M36,66 Q48,70 60,66" stroke="#4400AA" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Purple void energy orbs on body -->
  <circle cx="36" cy="54" r="3.5" fill="#6600BB" opacity="0.6"/>
  <circle cx="60" cy="54" r="3.5" fill="#6600BB" opacity="0.6"/>
  <circle cx="48" cy="64" r="4" fill="#7700CC" opacity="0.55"/>
  <circle cx="36" cy="54" r="1.5" fill="#CC44FF" opacity="0.5"/>
  <circle cx="60" cy="54" r="1.5" fill="#CC44FF" opacity="0.5"/>
  <circle cx="48" cy="64" r="1.8" fill="#BB33FF" opacity="0.5"/>

  <!-- SKULL FACE — visible within the shadow mass -->
  <ellipse cx="48" cy="28" rx="18" ry="16" fill="#D8D0B8"/>
  <!-- Skull dome -->
  <ellipse cx="48" cy="22" rx="16" ry="14" fill="#EDE8D0"/>
  <ellipse cx="46" cy="17" rx="10" ry="8" fill="#F5F0E0" opacity="0.35"/>
  <!-- Jaw -->
  <rect x="34" y="36" width="28" height="9" rx="4" fill="#CCCAA0"/>
  <rect x="36" y="41" width="24" height="5" rx="2.5" fill="#BCBA90"/>
  <!-- Skull shading -->
  <ellipse cx="55" cy="26" rx="8" ry="10" fill="#A0A080" opacity="0.2"/>
  <!-- Shadow over skull (void overlay) -->
  <ellipse cx="48" cy="26" rx="20" ry="18" fill="#0C0020" opacity="0.3"/>

  <!-- DEEP VOID EYE SOCKETS — purple energy blazing -->
  <ellipse cx="37" cy="25" rx="8" ry="9" fill="#060408"/>
  <ellipse cx="59" cy="25" rx="8" ry="9" fill="#060408"/>
  <!-- Void energy in sockets — layered glow -->
  <circle cx="37" cy="25" r="5" fill="#4400A0" opacity="0.9"/>
  <circle cx="37" cy="25" r="3.5" fill="#6600CC"/>
  <circle cx="37" cy="25" r="2.2" fill="#8800EE"/>
  <circle cx="37" cy="25" r="1.2" fill="#AA00FF"/>
  <circle cx="37" cy="25" r="0.6" fill="#DD88FF"/>
  <circle cx="36" cy="24" r="0.8" fill="#FFF" opacity="0.6"/>
  <!-- Eye glow aura -->
  <circle cx="37" cy="25" r="10" fill="#6600CC" opacity="0.15"/>

  <circle cx="59" cy="25" r="5" fill="#4400A0" opacity="0.9"/>
  <circle cx="59" cy="25" r="3.5" fill="#6600CC"/>
  <circle cx="59" cy="25" r="2.2" fill="#8800EE"/>
  <circle cx="59" cy="25" r="1.2" fill="#AA00FF"/>
  <circle cx="59" cy="25" r="0.6" fill="#DD88FF"/>
  <circle cx="58" cy="24" r="0.8" fill="#FFF" opacity="0.6"/>
  <circle cx="59" cy="25" r="10" fill="#6600CC" opacity="0.15"/>

  <!-- NASAL CAVITY -->
  <path d="M45,32 L48,29 L51,32 L50,35 L46,35 Z" fill="#060408"/>

  <!-- TEETH — long, yellowed -->
  <rect x="35" y="38" width="3.5" height="6" rx="1.2" fill="#C8C0A0"/>
  <rect x="40" y="38" width="3.5" height="6" rx="1.2" fill="#C8C0A0"/>
  <rect x="45" y="38" width="3.5" height="6" rx="1.2" fill="#C8C0A0"/>
  <rect x="50" y="38" width="3.5" height="6" rx="1.2" fill="#C8C0A0"/>
  <rect x="55" y="38" width="3.5" height="6" rx="1.2" fill="#C8C0A0"/>

  <!-- BONE CROWN — ancient and cracked -->
  <rect x="28" y="4" width="40" height="8" rx="3" fill="#A09A80"/>
  <rect x="28" y="4" width="40" height="3" rx="2" fill="#B0AA90" opacity="0.5"/>
  <!-- Crown spikes — irregular bone spikes -->
  <polygon points="32,4 29,0 35,4" fill="#C0B890"/>
  <polygon points="40,4 37,0 43,4" fill="#C0B890"/>
  <polygon points="48,2 44,0 52,0" fill="#D4CC9C"/>
  <polygon points="48,4 44,0 52,0" fill="#D4CC9C"/>
  <polygon points="56,4 53,0 59,4" fill="#C0B890"/>
  <polygon points="64,4 61,0 67,4" fill="#C0B890"/>
  <!-- Void gems on crown — pulsing purple -->
  <circle cx="32" cy="5" r="2.5" fill="#8800EE" opacity="0.9"/>
  <circle cx="32" cy="5" r="1.2" fill="#DD44FF"/>
  <circle cx="48" cy="3" r="3.5" fill="#AA00FF" opacity="0.95"/>
  <circle cx="48" cy="3" r="1.8" fill="#EE88FF"/>
  <circle cx="48" cy="3" r="0.8" fill="#FFF" opacity="0.7"/>
  <circle cx="64" cy="5" r="2.5" fill="#8800EE" opacity="0.9"/>
  <circle cx="64" cy="5" r="1.2" fill="#DD44FF"/>
  <!-- Crown void energy glow -->
  <circle cx="48" cy="3" r="8" fill="#AA00FF" opacity="0.12"/>
  <!-- Crown cracks -->
  <path d="M36,4 L38,12" stroke="#6A6448" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M58,4 L56,12" stroke="#6A6448" stroke-width="0.8" fill="none" opacity="0.5"/>
</svg>
