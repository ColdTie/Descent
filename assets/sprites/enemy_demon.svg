<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Hell ambient glow -->
  <circle cx="48" cy="54" r="44" fill="#6A0000" opacity="0.14"/>
  <!-- Ground shadow -->
  <ellipse cx="48" cy="93" rx="24" ry="5" fill="#000" opacity="0.4"/>

  <!-- WINGS — large bat wings spread wide -->
  <path d="M28,38 Q6,14 4,34 Q4,52 20,54 Q24,55 28,50 Z" fill="#3A0404" opacity="0.9"/>
  <!-- Wing membrane veins left -->
  <path d="M28,38 Q12,22 8,38" stroke="#5A0808" stroke-width="1.5" fill="none"/>
  <path d="M28,38 Q16,28 10,44" stroke="#5A0808" stroke-width="1" fill="none"/>
  <path d="M28,38 Q20,34 14,50" stroke="#5A0808" stroke-width="0.8" fill="none"/>
  <!-- Wing edge highlight -->
  <path d="M4,34 Q6,16 20,36" stroke="#701010" stroke-width="1.2" fill="none" opacity="0.6"/>

  <path d="M68,38 Q90,14 92,34 Q92,52 76,54 Q72,55 68,50 Z" fill="#3A0404" opacity="0.9"/>
  <path d="M68,38 Q84,22 88,38" stroke="#5A0808" stroke-width="1.5" fill="none"/>
  <path d="M68,38 Q80,28 86,44" stroke="#5A0808" stroke-width="1" fill="none"/>
  <path d="M68,38 Q76,34 82,50" stroke="#5A0808" stroke-width="0.8" fill="none"/>
  <path d="M92,34 Q90,16 76,36" stroke="#701010" stroke-width="1.2" fill="none" opacity="0.6"/>

  <!-- TAIL -->
  <path d="M58,76 Q70,68 72,56 Q74,44 64,42" stroke="#6A0C0C" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M58,76 Q70,68 72,56 Q74,44 64,42" stroke="#9A1414" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <polygon points="64,38 60,43 68,43" fill="#7A0E0E"/>
  <polygon points="64,38 61,41 67,41" fill="#A01818"/>

  <!-- HOOFED FEET -->
  <rect x="22" y="82" width="20" height="10" rx="3" fill="#380404"/>
  <rect x="54" y="82" width="20" height="10" rx="3" fill="#380404"/>
  <rect x="22" y="82" width="8" height="4" rx="2" fill="#4A0808" opacity="0.5"/>
  <!-- Split hoof dividers -->
  <rect x="31" y="82" width="2" height="10" fill="#1A0202"/>
  <rect x="63" y="82" width="2" height="10" fill="#1A0202"/>

  <!-- LEGS — muscular, powerful -->
  <rect x="22" y="60" width="20" height="24" rx="7" fill="#6A1010"/>
  <rect x="54" y="60" width="20" height="24" rx="7" fill="#6A1010"/>
  <rect x="22" y="60" width="7" height="24" rx="5" fill="#821414" opacity="0.35"/>
  <!-- Knee spikes -->
  <polygon points="20,68 15,62 20,74" fill="#500808"/>
  <polygon points="76,68 81,62 76,74" fill="#500808"/>

  <!-- MASSIVE TORSO -->
  <rect x="14" y="30" width="68" height="32" rx="8" fill="#5E1010"/>
  <rect x="14" y="30" width="68" height="8" rx="6" fill="#721818"/>
  <rect x="14" y="30" width="10" height="32" rx="6" fill="#721818" opacity="0.3"/>
  <!-- Chest muscle definition -->
  <ellipse cx="34" cy="44" rx="12" ry="14" fill="#4A0808" opacity="0.45"/>
  <ellipse cx="62" cy="44" rx="12" ry="14" fill="#4A0808" opacity="0.45"/>
  <!-- Chest center line -->
  <rect x="46" y="32" width="4" height="28" fill="#3A0606" opacity="0.4"/>
  <!-- Belly ridges -->
  <rect x="18" y="48" width="60" height="2.5" rx="1" fill="#701818" opacity="0.5"/>
  <rect x="18" y="54" width="60" height="2.5" rx="1" fill="#701818" opacity="0.5"/>

  <!-- ARMS — thick, demonic -->
  <rect x="4" y="28" width="18" height="32" rx="8" fill="#661010"/>
  <rect x="4" y="28" width="6" height="32" rx="5" fill="#7A1818" opacity="0.3"/>
  <rect x="74" y="28" width="18" height="32" rx="8" fill="#661010"/>
  <rect x="86" y="32" width="6" height="28" rx="5" fill="#3A0808" opacity="0.3"/>

  <!-- FIRE FISTS -->
  <!-- Left fire fist -->
  <rect x="2" y="58" width="20" height="14" rx="5" fill="#5A0E0E"/>
  <circle cx="10" cy="58" r="8" fill="#FF6A00" opacity="0.9"/>
  <circle cx="10" cy="58" r="6" fill="#FF9000" opacity="0.8"/>
  <circle cx="10" cy="56" r="4" fill="#FFC000" opacity="0.8"/>
  <circle cx="10" cy="54" r="2.5" fill="#FFE080"/>
  <circle cx="10" cy="53" r="1.2" fill="#FFF" opacity="0.9"/>
  <!-- Fire flicker particles left -->
  <circle cx="6" cy="52" r="1.5" fill="#FF8000" opacity="0.6"/>
  <circle cx="14" cy="50" r="1.2" fill="#FFA000" opacity="0.5"/>
  <circle cx="8" cy="48" r="1" fill="#FF6000" opacity="0.45"/>

  <!-- Right fire fist -->
  <rect x="74" y="58" width="20" height="14" rx="5" fill="#5A0E0E"/>
  <circle cx="86" cy="58" r="8" fill="#FF6A00" opacity="0.9"/>
  <circle cx="86" cy="58" r="6" fill="#FF9000" opacity="0.8"/>
  <circle cx="86" cy="56" r="4" fill="#FFC000" opacity="0.8"/>
  <circle cx="86" cy="54" r="2.5" fill="#FFE080"/>
  <circle cx="86" cy="53" r="1.2" fill="#FFF" opacity="0.9"/>
  <circle cx="90" cy="52" r="1.5" fill="#FF8000" opacity="0.6"/>
  <circle cx="82" cy="50" r="1.2" fill="#FFA000" opacity="0.5"/>
  <circle cx="88" cy="48" r="1" fill="#FF6000" opacity="0.45"/>

  <!-- THICK NECK -->
  <rect x="32" y="20" width="32" height="12" rx="6" fill="#641010"/>
  <rect x="32" y="20" width="10" height="12" rx="5" fill="#7A1818" opacity="0.3"/>

  <!-- HEAD — fearsome broad face -->
  <rect x="20" y="6" width="56" height="20" rx="8" fill="#6E1414"/>
  <rect x="20" y="6" width="56" height="8" rx="6" fill="#821A1A"/>
  <rect x="20" y="6" width="12" height="20" rx="6" fill="#821A1A" opacity="0.3"/>
  <!-- Brow ridge -->
  <rect x="20" y="6" width="56" height="8" rx="6" fill="#7A1818"/>

  <!-- FOUR HORNS -->
  <!-- Outer large horns -->
  <path d="M24,10 Q10,-2 16,8" stroke="#200404" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M24,10 Q12,0 18,8" stroke="#380808" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M72,10 Q86,-2 80,8" stroke="#200404" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M72,10 Q84,0 78,8" stroke="#380808" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Inner horns -->
  <path d="M35,8 Q28,-4 34,6" stroke="#280606" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M61,8 Q68,-4 62,6" stroke="#280606" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- HELLFIRE EYES -->
  <ellipse cx="34" cy="16" rx="9" ry="7" fill="#100202"/>
  <ellipse cx="34" cy="16" rx="7" ry="5.5" fill="#CC2000"/>
  <ellipse cx="34" cy="16" rx="5" ry="4" fill="#FF3000"/>
  <ellipse cx="34" cy="16" rx="3" ry="2.5" fill="#FF7000"/>
  <circle cx="34" cy="16" r="1.5" fill="#FFC040"/>
  <circle cx="32.5" cy="14.5" r="0.8" fill="#FFF" opacity="0.7"/>
  <!-- Slit pupil -->
  <rect x="33.5" y="13" width="1" height="7" rx="0.5" fill="#200000"/>
  <!-- Eye glow -->
  <ellipse cx="34" cy="16" rx="11" ry="8" fill="#FF2000" opacity="0.1"/>

  <ellipse cx="62" cy="16" rx="9" ry="7" fill="#100202"/>
  <ellipse cx="62" cy="16" rx="7" ry="5.5" fill="#CC2000"/>
  <ellipse cx="62" cy="16" rx="5" ry="4" fill="#FF3000"/>
  <ellipse cx="62" cy="16" rx="3" ry="2.5" fill="#FF7000"/>
  <circle cx="62" cy="16" r="1.5" fill="#FFC040"/>
  <circle cx="60.5" cy="14.5" r="0.8" fill="#FFF" opacity="0.7"/>
  <rect x="61.5" y="13" width="1" height="7" rx="0.5" fill="#200000"/>
  <ellipse cx="62" cy="16" rx="11" ry="8" fill="#FF2000" opacity="0.1"/>

  <!-- FANGED MOUTH -->
  <path d="M22,22 Q48,30 74,22" stroke="#200000" stroke-width="3.5" fill="none"/>
  <rect x="26" y="22" width="4" height="6" rx="1.5" fill="#E0E0C0"/>
  <rect x="33" y="23" width="5" height="5" rx="1.5" fill="#E0E0C0"/>
  <rect x="40" y="23" width="5" height="5" rx="1.5" fill="#E0E0C0"/>
  <rect x="47" y="23" width="5" height="5" rx="1.5" fill="#E0E0C0"/>
  <rect x="54" y="23" width="5" height="5" rx="1.5" fill="#E0E0C0"/>
  <rect x="62" y="23" width="4" height="6" rx="1.5" fill="#E0E0C0"/>
  <!-- Gum line -->
  <path d="M22,22 Q48,28 74,22" stroke="#880000" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
