<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<defs>
  <linearGradient id="sk" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#C02020"/><stop offset="45%" stop-color="#901010"/><stop offset="100%" stop-color="#500808"/>
  </linearGradient>
  <linearGradient id="ar" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#282230"/><stop offset="50%" stop-color="#181420"/><stop offset="100%" stop-color="#080610"/>
