<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<defs>
  <!-- Scale body: deep emerald gradient -->
  <linearGradient id="sk" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#5CB070"/><stop offset="45%" stop-color="#2A7040"/><stop offset="100%" stop-color="#103A20"/>
  </linearGradient>
  <!-- Darker scale armor for limbs / claws -->
  <linearGradient id="ar" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#2A6038"/><stop offset="50%" stop-color="#143020"/><stop offset="100%" stop-color="#040A06"/>
  </linearGradient>
  <!-- Belly / throat: pale cyan plates -->
  <linearGradient id="bl" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#C8E8F0"/><stop offset="50%" stop-color="#88B8C8"/><stop offset="100%" stop-color="#3A6878"/>
  </linearGradient>
  <!-- Red dorsal crest -->
  <linearGradient id="cr" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#E04848"/><stop offset="50%" stop-color="#9C1818"/><stop offset="100%" stop-color="#400606"/>
  </linearGradient>
  <!-- Horns -->
  <linearGradient id="hr" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#1A2A1A"/><stop offset="100%" stop-color="#040806"/>
  </linearGradient>
  <!-- Cyan eye glow -->
  <radialGradient id="ey" cx="40%" cy="35%">
    <stop offset="0%" stop-color="#FFFFFF"/><stop offset="35%" stop-color="#A8F0FF"/><stop offset="100%" stop-color="#003040"/>
  </radialGradient>
  <!-- Maw -->
  <linearGradient id="mw" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#400808"/><stop offset="100%" stop-color="#180404"/>
  </linearGradient>
</defs>

<!-- Predator aura + ground shadow -->
<circle cx="48" cy="56" r="42" fill="#00604A" opacity="0.12"/>
<ellipse cx="48" cy="92" rx="22" ry="4.5" fill="#000" opacity="0.45"/>

<!-- TAIL swept behind to the right -->
<path d="M62,60 C76,52 88,38 92,22 C84,30 76,40 64,52 Z" fill="url(#sk)"/>
<path d="M62,60 C76,52 86,40 90,28 C82,34 74,44 66,54" fill="#0A2010" opacity="0.55"/>
<!-- Tail crest spines -->
<polygon points="68,48 64,42 72,46" fill="url(#cr)"/>
<polygon points="76,40 72,32 80,36" fill="url(#cr)"/>
<polygon points="84,30 80,22 88,24" fill="url(#cr)"/>

<!-- HIND LEGS (powerful raptor draw-up) -->
<!-- Right thigh (viewer left) -->
<path d="M22,52 C18,56 16,68 22,82 L40,82 L42,52 Z" fill="url(#ar)"/>
<path d="M24,54 C22,60 22,68 26,78 L34,78 L36,56 Z" fill="#082010" opacity="0.45"/>
<!-- Right shin / foot -->
<rect x="22" y="78" width="22" height="10" rx="3" fill="url(#ar)"/>
<!-- Right toe claws (3 sickles) -->
<path d="M22,88 L18,93 L22,93 Z M30,88 L26,94 L30,94 Z M38,88 L34,94 L38,94 Z" fill="#100404"/>
<polygon points="20,93 16,90 18,93" fill="#C0C8D0"/>
<polygon points="28,94 24,91 26,94" fill="#C0C8D0"/>
<polygon points="36,94 32,91 34,94" fill="#C0C8D0"/>

<!-- Left thigh (slightly back) -->
<path d="M52,52 L54,82 L72,82 C76,68 74,56 72,52 Z" fill="url(#ar)"/>
<path d="M58,56 L60,78 L70,78 C72,68 70,58 68,54 Z" fill="#082010" opacity="0.45"/>
<rect x="52" y="78" width="22" height="10" rx="3" fill="url(#ar)"/>
<path d="M56,88 L52,93 L56,93 Z M64,88 L60,94 L64,94 Z M72,88 L68,94 L72,94 Z" fill="#100404"/>
<polygon points="54,93 50,90 52,93" fill="#C0C8D0"/>
<polygon points="62,94 58,91 60,94" fill="#C0C8D0"/>
<polygon points="70,94 66,91 68,94" fill="#C0C8D0"/>

<!-- TORSO upright predator -->
<path d="M28,30 C24,34 24,50 28,62 L68,62 C72,50 72,34 68,30 Z" fill="url(#sk)"/>
<!-- Back highlight -->
<path d="M30,32 C28,36 28,46 30,54 L40,54 L42,32 Z" fill="#88D098" opacity="0.35"/>
<!-- Side shadow -->
<path d="M66,32 L64,54 L68,54 C72,48 72,38 70,32 Z" fill="#06180C" opacity="0.55"/>

<!-- BELLY PLATES (pale cyan) -->
<path d="M34,42 C30,48 30,56 34,62 L62,62 C66,56 66,48 62,42 Z" fill="url(#bl)"/>
<!-- belly plate lines -->
<line x1="36" y1="48" x2="60" y2="48" stroke="#3A6878" stroke-width="1" opacity="0.7"/>
<line x1="35" y1="53" x2="61" y2="53" stroke="#3A6878" stroke-width="1" opacity="0.7"/>
<line x1="35" y1="58" x2="61" y2="58" stroke="#3A6878" stroke-width="1" opacity="0.7"/>
<!-- belly highlight -->
<path d="M38,44 C36,48 36,54 38,58 L46,58 L46,44 Z" fill="#E0F0F4" opacity="0.45"/>

<!-- DORSAL CREST (red spines down the back) -->
<polygon points="30,28 28,16 34,28" fill="url(#cr)"/>
<polygon points="38,26 36,12 44,26" fill="url(#cr)"/>
<polygon points="48,26 46,10 54,26" fill="url(#cr)"/>
<polygon points="58,26 56,12 64,26" fill="url(#cr)"/>
<polygon points="66,28 64,16 70,28" fill="url(#cr)"/>
<!-- Crest highlights -->
<polygon points="40,26 41,14 42,26" fill="#FFA0A0" opacity="0.7"/>
<polygon points="50,26 51,12 52,26" fill="#FFA0A0" opacity="0.7"/>
<polygon points="60,26 61,14 62,26" fill="#FFA0A0" opacity="0.7"/>

<!-- ARMS (small raptor forelimbs reaching forward) -->
<rect x="14" y="34" width="14" height="22" rx="6" fill="url(#ar)"/>
<rect x="14" y="34" width="6" height="22" rx="4" fill="#102818" opacity="0.4"/>
<rect x="68" y="34" width="14" height="22" rx="6" fill="url(#ar)"/>
<rect x="76" y="36" width="6" height="20" rx="3" fill="#040A06" opacity="0.5"/>
<!-- Hands with claws -->
<rect x="12" y="52" width="18" height="10" rx="4" fill="#101810"/>
<rect x="66" y="52" width="18" height="10" rx="4" fill="#101810"/>
<!-- Claw tips left -->
<path d="M14,52 L10,46 M18,52 L16,46 M22,52 L22,45 M26,52 L28,46" stroke="#D0D0D8" stroke-width="2.2" stroke-linecap="round"/>
<!-- Claw tips right -->
<path d="M70,52 L66,46 M74,52 L72,46 M78,52 L78,45 M82,52 L80,46" stroke="#D0D0D8" stroke-width="2.2" stroke-linecap="round"/>

<!-- NECK -->
<rect x="40" y="24" width="16" height="10" rx="4" fill="url(#sk)"/>
<rect x="40" y="24" width="16" height="6" rx="3" fill="#A0E0B0" opacity="0.25"/>

<!-- HEAD: angular raptor skull -->
<path d="M28,12 C24,16 22,22 26,28 L34,30 L62,30 L70,28 C74,22 72,16 68,12 C58,4 38,4 28,12 Z" fill="url(#sk)"/>
<!-- Skull side shading -->
<ellipse cx="60" cy="20" rx="11" ry="11" fill="#0A2010" opacity="0.32"/>
<!-- Snout block (lower jaw) -->
<path d="M34,28 L34,38 L62,38 L62,28 Z" fill="url(#sk)"/>
<path d="M34,28 L34,34 L62,34 L62,28 Z" fill="#08180C" opacity="0.4"/>

<!-- BACKWARD-SWEPT HORNS -->
<path d="M22,12 C12,2 4,-2 6,4 C8,12 14,16 24,18 Z" fill="url(#hr)"/>
<path d="M22,12 C14,4 8,0 10,4 C12,10 16,14 24,18" fill="#020806" opacity="0.55"/>
<path d="M74,12 C84,2 92,-2 90,4 C88,12 82,16 72,18 Z" fill="url(#hr)"/>
<path d="M74,12 C82,4 88,0 86,4 C84,10 80,14 72,18" fill="#020806" opacity="0.55"/>
<!-- Central head spike -->
<polygon points="48,4 44,16 52,16" fill="url(#hr)"/>

<!-- BROW heavy ridge -->
<rect x="28" y="16" width="14" height="5" rx="2.5" fill="#08180C" transform="rotate(-8,35,18)"/>
<rect x="54" y="16" width="14" height="5" rx="2.5" fill="#08180C" transform="rotate(8,61,18)"/>

<!-- EYES — cyan glow with vertical slit -->
<ellipse cx="36" cy="22" rx="8" ry="7" fill="#020A0E"/>
<ellipse cx="36" cy="22" rx="6.5" ry="5.5" fill="#04141A"/>
<ellipse cx="36" cy="22" rx="5" ry="4.2" fill="url(#ey)"/>
<rect x="35" y="18" width="2" height="8" rx="0.6" fill="#040A0E"/>
<circle cx="34.5" cy="20.5" r="0.9" fill="white" opacity="0.95"/>
<ellipse cx="36" cy="22" rx="10" ry="8" fill="#40E0F0" opacity="0.10"/>

<ellipse cx="60" cy="22" rx="8" ry="7" fill="#020A0E"/>
<ellipse cx="60" cy="22" rx="6.5" ry="5.5" fill="#04141A"/>
<ellipse cx="60" cy="22" rx="5" ry="4.2" fill="url(#ey)"/>
<rect x="59" y="18" width="2" height="8" rx="0.6" fill="#040A0E"/>
<circle cx="58.5" cy="20.5" r="0.9" fill="white" opacity="0.95"/>
<ellipse cx="60" cy="22" rx="10" ry="8" fill="#40E0F0" opacity="0.10"/>

<!-- NOSTRILS on snout -->
<ellipse cx="42" cy="33" rx="2" ry="1.4" fill="#04140A"/>
<ellipse cx="54" cy="33" rx="2" ry="1.4" fill="#04140A"/>

<!-- MAW SNARL showing fangs -->
<path d="M34,38 Q48,46 62,38" fill="url(#mw)"/>
<path d="M34,38 Q48,44 62,38" stroke="#280404" stroke-width="2" fill="none"/>
<!-- Upper fangs -->
<rect x="36" y="38" width="3.4" height="6" rx="1.2" fill="#F0EAD0"/>
<rect x="42" y="38" width="3" height="5" rx="1" fill="#E8E0C0"/>
<rect x="50" y="38" width="3" height="5" rx="1" fill="#E8E0C0"/>
<rect x="56" y="38" width="3.4" height="6" rx="1.2" fill="#F0EAD0"/>
<!-- Lower fangs -->
<polygon points="40,46 38,42 42,42" fill="#E0D8B8"/>
<polygon points="56,46 54,42 58,42" fill="#E0D8B8"/>

</svg>
