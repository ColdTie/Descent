  <circle cx="36" cy="24" r="2.2" fill="#E8A020"/>
  <circle cx="28" cy="24" r="1.1" fill="#0A0A0A"/>
  <circle cx="36" cy="24" r="1.1" fill="#0A0A0A"/>
  <circle cx="27.5" cy="23.5" r="0.6" fill="#FFE880" opacity="0.9"/>
  <circle cx="35.5" cy="23.5" r="0.6" fill="#FFE880" opacity="0.9"/>
  <!-- Scarf -->
  <path d="M22,32 Q32,35 42,32" stroke="#2A1A50" stroke-width="2.5" fill="none"/>
  <!-- Left dagger blade -->
  <rect x="9" y="30" width="3" height="20" rx="1.5" fill="#D0D0E8"/>
  <!-- Left dagger fuller -->
  <rect x="10.5" y="32" width="1" height="16" rx="0.5" fill="#EAEAF8" opacity="0.6"/>
