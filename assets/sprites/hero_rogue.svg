  <rect x="7" y="29" width="7" height="2.5" rx="1" fill="#8A7030"/>
  <!-- Left handle -->
  <rect x="9" y="25" width="3" height="5" rx="1" fill="#6A5028"/>
  <!-- Right dagger blade -->
  <rect x="52" y="30" width="3" height="20" rx="1.5" fill="#D0D0E8"/>
  <!-- Right dagger fuller -->
  <rect x="53.5" y="32" width="1" height="16" rx="0.5" fill="#EAEAF8" opacity="0.6"/>
  <!-- Right crossguard -->
  <rect x="50" y="29" width="7" height="2.5" rx="1" fill="#8A7030"/>
  <!-- Right handle -->
  <rect x="52" y="25" width="3" height="5" rx="1" fill="#6A5028"/>
  <!-- Subtle green poison on blades -->
  <rect x="9" y="44" width="3" height="5" rx="1" fill="#40A020" opacity="0.4"/>
  <rect x="52" y="44" width="3" height="5" rx="1" fill="#40A020" opacity="0.4"/>
