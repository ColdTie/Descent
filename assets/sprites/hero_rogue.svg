    <stop offset="0%" stop-color="#C08858"/><stop offset="45%" stop-color="#986040"/><stop offset="100%" stop-color="#6A3818"/>
  </linearGradient>
  <linearGradient id="cu" x1="15%" y1="0%" x2="85%" y2="100%">
