<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Ground shadow -->
  <ellipse cx="48" cy="93" rx="18" ry="4" fill="#000" opacity="0.3"/>

  <!-- CLUB WEAPON — held in left arm -->
  <rect x="6" y="10" width="8" height="48" rx="3" fill="#6A4A22"/>
  <rect x="7.5" y="10" width="3" height="48" rx="1.5" fill="#8A6030" opacity="0.5"/>
  <!-- Club head — bulbous -->
  <ellipse cx="10" cy="10" rx="11" ry="12" fill="#7A5A2A"/>
  <ellipse cx="10" cy="10" rx="9" ry="10" fill="#5A3C18"/>
  <!-- Club spikes -->
  <polygon points="2,4 0,0 4,4" fill="#C0A060"/>
  <polygon points="18,4 20,0 16,4" fill="#C0A060"/>
  <polygon points="4,18 0,18 4,14" fill="#C0A060"/>
  <!-- Club rings -->
  <rect x="5" y="34" width="10" height="3" rx="1" fill="#9A7830" opacity="0.7"/>
  <rect x="5" y="42" width="10" height="3" rx="1" fill="#9A7830" opacity="0.7"/>

  <!-- BOOTS — crude leather -->
  <rect x="28" y="80" width="16" height="12" rx="3" fill="#4A2E10"/>
  <rect x="52" y="80" width="16" height="12" rx="3" fill="#4A2E10"/>
  <rect x="28" y="80" width="16" height="4" rx="2" fill="#6A4218" opacity="0.5"/>

  <!-- LEGS — bowed, squat -->
  <rect x="29" y="60" width="14" height="22" rx="5" fill="#3A6028"/>
  <rect x="53" y="60" width="14" height="22" rx="5" fill="#3A6028"/>
  <rect x="29" y="60" width="5" height="22" rx="3" fill="#4A7832" opacity="0.4"/>

  <!-- BELT — wide, studded -->
  <rect x="25" y="56" width="46" height="7" rx="2" fill="#3A2210"/>
  <rect x="42" y="55" width="12" height="9" rx="2" fill="#5A3418"/>
  <!-- Belt studs -->
  <circle cx="30" cy="60" r="2" fill="#8A6828"/>
  <circle cx="66" cy="60" r="2" fill="#8A6828"/>
  <circle cx="38" cy="60" r="2" fill="#8A6828"/>
  <circle cx="58" cy="60" r="2" fill="#8A6828"/>

  <!-- TORSO — ragged leather armor -->
  <rect x="24" y="32" width="48" height="27" rx="5" fill="#4A7830"/>
  <rect x="24" y="32" width="48" height="5" rx="3" fill="#5A8C3A" opacity="0.4"/>
  <!-- Leather chest plate over torso -->
  <rect x="28" y="35" width="40" height="20" rx="4" fill="#4A3018"/>
  <rect x="28" y="35" width="14" height="20" rx="3" fill="#5A3C22" opacity="0.5"/>
  <!-- Armor stitching -->
  <rect x="41" y="36" width="2" height="18" fill="#3A2210" opacity="0.6"/>
  <rect x="30" y="37" width="2" height="14" rx="1" fill="#3A2210" opacity="0.4"/>
  <rect x="64" y="37" width="2" height="14" rx="1" fill="#3A2210" opacity="0.4"/>
  <!-- Patches on armor -->
  <rect x="32" y="42" width="8" height="7" rx="1" fill="#3A2810"/>
  <rect x="55" y="44" width="7" height="6" rx="1" fill="#2E2008"/>

  <!-- LEFT ARM (holding club) -->
  <rect x="8" y="30" width="18" height="24" rx="7" fill="#3E7028"/>
  <rect x="8" y="30" width="6" height="24" rx="5" fill="#4E8832" opacity="0.3"/>

  <!-- RIGHT ARM (shield arm) -->
  <rect x="70" y="30" width="18" height="24" rx="7" fill="#3E7028"/>
  <!-- Small wooden buckler shield -->
  <ellipse cx="82" cy="52" rx="10" ry="10" fill="#6A4A1E"/>
  <ellipse cx="82" cy="52" rx="8" ry="8" fill="#5A3C14"/>
  <ellipse cx="82" cy="52" rx="5" ry="5" fill="#6A4A1E"/>
  <!-- Shield boss -->
  <circle cx="82" cy="52" r="3" fill="#A07828"/>
  <circle cx="82" cy="52" r="1.5" fill="#C09038"/>

  <!-- BIG POINTY EARS -->
  <path d="M22,28 Q6,16 8,30 Q10,40 22,36 Z" fill="#4A7830"/>
  <path d="M22,28 Q8,20 10,32" stroke="#5A8A3A" stroke-width="1.2" fill="none"/>
  <path d="M74,28 Q90,16 88,30 Q86,40 74,36 Z" fill="#4A7830"/>
  <path d="M74,28 Q88,20 86,32" stroke="#5A8A3A" stroke-width="1.2" fill="none"/>

  <!-- NECK — short thick -->
  <rect x="40" y="24" width="16" height="10" rx="4" fill="#4A7830"/>

  <!-- HEAD — big bulging forehead -->
  <ellipse cx="48" cy="18" rx="20" ry="18" fill="#4E8030"/>
  <ellipse cx="48" cy="10" rx="16" ry="10" fill="#4E8030"/>
  <ellipse cx="42" cy="14" rx="10" ry="9" fill="#5A9038" opacity="0.3"/>

  <!-- CRUDE HELMET — sits askew -->
  <rect x="26" y="4" width="44" height="12" rx="4" fill="#5A4220"/>
  <rect x="26" y="4" width="44" height="4" rx="3" fill="#7A5A2A" opacity="0.5"/>
  <!-- Helmet rivets -->
  <circle cx="30" cy="8" r="1.5" fill="#A07828"/>
  <circle cx="66" cy="8" r="1.5" fill="#A07828"/>
  <circle cx="48" cy="6" r="1.5" fill="#A07828"/>

  <!-- BROW RIDGE — beady, mean -->
  <rect x="30" y="18" width="14" height="4" rx="2" fill="#2E5018" transform="rotate(-8,37,20)"/>
  <rect x="52" y="18" width="14" height="4" rx="2" fill="#2E5018" transform="rotate(8,59,20)"/>

  <!-- BEADY YELLOW EYES -->
  <ellipse cx="38" cy="24" rx="7" ry="6" fill="#0A0800"/>
  <ellipse cx="38" cy="24" rx="5.5" ry="4.5" fill="#C09000"/>
  <ellipse cx="38" cy="24" rx="3.5" ry="3" fill="#FFB800"/>
  <circle cx="38" cy="24" r="2" fill="#FFD840"/>
  <circle cx="37" cy="23" r="1" fill="#FFF" opacity="0.65"/>
  <!-- Pupil slit -->
  <rect x="37.5" y="22.5" width="1" height="4" rx="0.5" fill="#0A0800"/>

  <ellipse cx="58" cy="24" rx="7" ry="6" fill="#0A0800"/>
  <ellipse cx="58" cy="24" rx="5.5" ry="4.5" fill="#C09000"/>
  <ellipse cx="58" cy="24" rx="3.5" ry="3" fill="#FFB800"/>
  <circle cx="58" cy="24" r="2" fill="#FFD840"/>
  <circle cx="57" cy="23" r="1" fill="#FFF" opacity="0.65"/>
  <rect x="57.5" y="22.5" width="1" height="4" rx="0.5" fill="#0A0800"/>

  <!-- FLAT WIDE NOSE -->
  <ellipse cx="48" cy="30" rx="5.5" ry="4" fill="#3A6220"/>
  <circle cx="45.5" cy="31.5" r="1.5" fill="#2A4A18"/>
  <circle cx="50.5" cy="31.5" r="1.5" fill="#2A4A18"/>

  <!-- JAGGED GRIN + TUSK -->
  <path d="M34,35 Q48,42 62,35" stroke="#1E3810" stroke-width="2.5" fill="none"/>
  <rect x="36" y="35" width="3" height="5" rx="1" fill="#C8C0A0"/>
  <rect x="41" y="36" width="3" height="4" rx="1" fill="#C8C0A0"/>
  <!-- Prominent tusk -->
  <rect x="46" y="35" width="4" height="7" rx="1.5" fill="#E0D8B0"/>
  <rect x="53" y="36" width="3" height="4" rx="1" fill="#C8C0A0"/>
  <rect x="58" y="35" width="3" height="5" rx="1" fill="#C8C0A0"/>
</svg>
