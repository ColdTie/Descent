<ellipse cx="10" cy="18" rx="13" ry="14" fill="#7A5820"/>
<ellipse cx="10" cy="18" rx="10" ry="11" fill="#5A4018"/>
<ellipse cx="10" cy="18" rx="7" ry="8" fill="#4A3010"/>
