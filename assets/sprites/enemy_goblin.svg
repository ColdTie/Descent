<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<defs>
  <linearGradient id="sk" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#58A030"/><stop offset="45%" stop-color="#3A7820"/><stop offset="100%" stop-color="#1E4010"/>
  </linearGradient>
  <linearGradient id="lt" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#5A3C1A"/><stop offset="50%" stop-color="#3C2810"/><stop offset="100%" stop-color="#1E1208"/>
  </linearGradient>
  <linearGradient id="hm" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#6A4A22"/><stop offset="50%" stop-color="#4A3018"/><stop offset="100%" stop-color="#2A1808"/>
  </linearGradient>
  <linearGradient id="cb" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#8A6030"/><stop offset="100%" stop-color="#4A3010"/>
  </linearGradient>
  <linearGradient id="sh" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#7A5A28"/><stop offset="50%" stop-color="#5A4018"/><stop offset="100%" stop-color="#2A1C08"/>
  </linearGradient>
  <radialGradient id="ey" cx="40%" cy="35%">
    <stop offset="0%" stop-color="#FFE040"/><stop offset="50%" stop-color="#E0A000"/><stop offset="100%" stop-color="#804000"/>
  </radialGradient>
