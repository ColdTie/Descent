<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<defs>
  <linearGradient id="ar" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#262038"/><stop offset="50%" stop-color="#160E28"/><stop offset="100%" stop-color="#080612"/>
  </linearGradient>
  <linearGradient id="gd" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#E0C040"/><stop offset="45%" stop-color="#C09830"/><stop offset="100%" stop-color="#7A6018"/>
  </linearGradient>
  <linearGradient id="cp" x1="10%" y1="0%" x2="90%" y2="100%">
    <stop offset="0%" stop-color="#9A1010"/><stop offset="50%" stop-color="#6A0808"/><stop offset="100%" stop-color="#300404"/>
  </linearGradient>
  <linearGradient id="sw" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#E8E8F8"/><stop offset="35%" stop-color="#B0B0D0"/><stop offset="100%" stop-color="#505070"/>
  </linearGradient>
  <radialGradient id="ey" cx="40%" cy="35%">
    <stop offset="0%" stop-color="#FF4020"/><stop offset="50%" stop-color="#CC1000"/><stop offset="100%" stop-color="#400000"/>
  </radialGradient>
  <radialGradient id="gl" cx="50%" cy="50%">
    <stop offset="0%" stop-color="#CC0000" stop-opacity="0.4"/><stop offset="100%" stop-color="#CC0000" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Dark aura -->
<circle cx="48" cy="52" r="44" fill="#400000" opacity="0.16"/>
