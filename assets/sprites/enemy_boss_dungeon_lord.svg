<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Menacing dark aura -->
  <circle cx="48" cy="52" r="44" fill="#400000" opacity="0.16"/>
  <!-- Ground shadow -->
  <ellipse cx="48" cy="93" rx="26" ry="5" fill="#000" opacity="0.4"/>

  <!-- CRIMSON CAPE — flowing behind -->
  <path d="M16,28 L6,36 L8,88 L22,84 L22,44 Z" fill="#8A1010" opacity="0.9"/>
  <path d="M80,28 L90,36 L88,88 L74,84 L74,44 Z" fill="#8A1010" opacity="0.9"/>
  <!-- Cape shine -->
  <path d="M16,28 L9,36 L10,72" stroke="#A81818" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M80,28 L87,36 L86,72" stroke="#A81818" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Cape shadow edge -->
  <path d="M22,44 L22,84" stroke="#5A0808" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M74,44 L74,84" stroke="#5A0808" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- BOOTS — spiked plate -->
  <rect x="22" y="80" width="22" height="12" rx="3" fill="#141020"/>
  <rect x="52" y="80" width="22" height="12" rx="3" fill="#141020"/>
  <rect x="22" y="80" width="22" height="4" rx="2" fill="#221834" opacity="0.5"/>
  <!-- Boot spikes -->
  <polygon points="22,80 18,74 24,78" fill="#C09030"/>
  <polygon points="74,80 78,74 72,78" fill="#C09030"/>

  <!-- GREAVES / LEGS -->
  <rect x="22" y="60" width="22" height="22" rx="5" fill="#1C1430"/>
  <rect x="52" y="60" width="22" height="22" rx="5" fill="#1C1430"/>
  <rect x="22" y="60" width="7" height="22" rx="4" fill="#2C2046" opacity="0.4"/>
  <rect x="70" y="64" width="6" height="18" rx="3" fill="#0C0818" opacity="0.4"/>
  <!-- Gold knee trim -->
  <rect x="20" y="68" width="26" height="4" rx="2" fill="#C09030"/>
  <rect x="50" y="68" width="26" height="4" rx="2" fill="#C09030"/>

  <!-- GOLD STUDDED BELT -->
  <rect x="20" y="57" width="56" height="6" rx="2" fill="#1C1430"/>
  <rect x="40" y="56" width="16" height="8" rx="2" fill="#C09030"/>
  <rect x="42" y="57" width="12" height="6" rx="1" fill="#A07828"/>
  <!-- Belt studs -->
  <circle cx="26" cy="60" r="2.5" fill="#C09030"/>
  <circle cx="34" cy="60" r="2.5" fill="#C09030"/>
  <circle cx="62" cy="60" r="2.5" fill="#C09030"/>
  <circle cx="70" cy="60" r="2.5" fill="#C09030"/>

  <!-- TORSO — imposing dark plate -->
  <rect x="18" y="28" width="60" height="31" rx="7" fill="#1C1430"/>
  <rect x="18" y="28" width="60" height="8" rx="5" fill="#2C2046" opacity="0.4"/>
  <rect x="18" y="28" width="8" height="31" rx="5" fill="#2C2046" opacity="0.3"/>
  <rect x="70" y="32" width="8" height="27" rx="4" fill="#0C0818" opacity="0.4"/>
  <rect x="18" y="52" width="60" height="7" rx="4" fill="#0C0818" opacity="0.35"/>
  <!-- Skull-and-cross emblem center -->
  <rect x="32" y="30" width="32" height="22" rx="3" fill="#C09030"/>
  <rect x="33" y="31" width="30" height="20" rx="2" fill="#1C1430"/>
  <!-- Skull face on emblem -->
  <ellipse cx="48" cy="37" rx="8" ry="7" fill="#C09030" opacity="0.9"/>
  <ellipse cx="44" cy="36" rx="2.5" ry="3" fill="#0C0818"/>
  <ellipse cx="52" cy="36" rx="2.5" ry="3" fill="#0C0818"/>
  <rect x="43" y="41" width="10" height="2" rx="1" fill="#0C0818"/>
  <!-- Cross below skull -->
  <rect x="46" y="44" width="4" height="8" rx="1" fill="#C09030" opacity="0.7"/>
  <rect x="42" y="46" width="12" height="3" rx="1" fill="#C09030" opacity="0.7"/>
  <!-- Shoulder spaulders gold -->
  <ellipse cx="20" cy="30" rx="8" ry="6" fill="#C09030"/>
  <ellipse cx="76" cy="30" rx="8" ry="6" fill="#C09030"/>
  <ellipse cx="20" cy="30" rx="5" ry="4" fill="#A07828"/>
  <ellipse cx="76" cy="30" rx="5" ry="4" fill="#A07828"/>

  <!-- ARMS — dark plate -->
  <rect x="6" y="30" width="16" height="28" rx="6" fill="#1C1430"/>
  <rect x="6" y="30" width="5" height="28" rx="4" fill="#2C2046" opacity="0.3"/>
  <rect x="74" y="30" width="16" height="28" rx="6" fill="#1C1430"/>
  <rect x="85" y="34" width="5" height="24" rx="3" fill="#0C0818" opacity="0.35"/>

  <!-- TWIN SWORDS -->
  <!-- Left sword — angled raise -->
  <rect x="2" y="8" width="5" height="58" rx="2" fill="#B0B0C8" transform="rotate(15,4,36)"/>
  <rect x="3" y="10" width="2" height="54" rx="1" fill="#D0D0E8" opacity="0.55" transform="rotate(15,4,36)"/>
  <!-- Left sword crossguard -->
  <rect x="0" y="50" width="14" height="5" rx="2" fill="#C09030" transform="rotate(15,7,52)"/>
  <!-- Left sword pommel -->
  <circle cx="6" cy="60" r="4" fill="#A07828" transform="rotate(15,4,56)"/>

  <!-- Right sword — lower position -->
  <rect x="89" y="12" width="5" height="58" rx="2" fill="#B0B0C8" transform="rotate(-15,91,40)"/>
  <rect x="90" y="14" width="2" height="54" rx="1" fill="#D0D0E8" opacity="0.55" transform="rotate(-15,91,40)"/>
  <rect x="82" y="54" width="14" height="5" rx="2" fill="#C09030" transform="rotate(-15,89,56)"/>
  <circle cx="90" cy="64" r="4" fill="#A07828" transform="rotate(-15,91,60)"/>

  <!-- GOLD GAUNTLETS -->
  <rect x="4" y="56" width="18" height="14" rx="5" fill="#C09030"/>
  <rect x="4" y="56" width="6" height="14" rx="4" fill="#D4AA40" opacity="0.3"/>
  <rect x="74" y="56" width="18" height="14" rx="5" fill="#C09030"/>
  <rect x="86" y="60" width="6" height="10" rx="3" fill="#A07828" opacity="0.35"/>
  <!-- Gauntlet knuckles -->
  <rect x="5" y="58" width="16" height="2.5" rx="1" fill="#A07828" opacity="0.5"/>
  <rect x="5" y="62" width="16" height="2.5" rx="1" fill="#A07828" opacity="0.5"/>
  <rect x="75" y="58" width="16" height="2.5" rx="1" fill="#A07828" opacity="0.5"/>
  <rect x="75" y="62" width="16" height="2.5" rx="1" fill="#A07828" opacity="0.5"/>

  <!-- NECK -->
  <rect x="38" y="20" width="20" height="10" rx="4" fill="#1C1430"/>

  <!-- HEAD — shadowed face -->
  <rect x="26" y="8" width="44" height="16" rx="5" fill="#14100A"/>

  <!-- CROWN HELM — black plate + gold crown -->
  <rect x="20" y="4" width="56" height="20" rx="6" fill="#1C1430"/>
  <rect x="20" y="4" width="56" height="6" rx="4" fill="#2C2046" opacity="0.4"/>
  <rect x="20" y="4" width="8" height="20" rx="4" fill="#2C2046" opacity="0.25"/>
  <rect x="68" y="8" width="8" height="16" rx="3" fill="#0C0818" opacity="0.3"/>
  <!-- Crown band gold -->
  <rect x="20" y="2" width="56" height="7" rx="3" fill="#C09030"/>
  <rect x="20" y="2" width="18" height="7" rx="3" fill="#D4AA40" opacity="0.3"/>
  <!-- Crown spikes -->
  <polygon points="24,2 21,0 27,2" fill="#C09030"/>
  <polygon points="35,2 32,0 38,2" fill="#C09030"/>
  <polygon points="48,0 44,0 52,0" fill="#D4AA40"/>
  <polygon points="48,2 44,0 52,0" fill="#D4AA40"/>
  <polygon points="61,2 58,0 64,2" fill="#C09030"/>
  <polygon points="72,2 69,0 75,2" fill="#C09030"/>
  <!-- Crown gemstones -->
  <circle cx="30" cy="4" r="2.5" fill="#CC0000"/>
  <circle cx="48" cy="2" r="3" fill="#0080FF"/>
  <circle cx="66" cy="4" r="2.5" fill="#CC0000"/>
  <!-- Visor -->
  <rect x="22" y="12" width="52" height="10" rx="3" fill="#0C0818"/>
  <!-- CRIMSON EYES — blazing -->
  <ellipse cx="34" cy="17" rx="8" ry="5" fill="#080408"/>
  <ellipse cx="34" cy="17" rx="6.5" ry="4" fill="#CC1000"/>
  <ellipse cx="34" cy="17" rx="4.5" ry="3" fill="#EE2000"/>
  <ellipse cx="34" cy="17" rx="2.5" ry="2" fill="#FF5030"/>
  <circle cx="34" cy="17" r="1.2" fill="#FF9060"/>
  <circle cx="32.5" cy="15.5" r="0.8" fill="#FFF" opacity="0.6"/>
  <!-- Eye glow -->
  <ellipse cx="34" cy="17" rx="10" ry="7" fill="#FF1000" opacity="0.1"/>

  <ellipse cx="62" cy="17" rx="8" ry="5" fill="#080408"/>
  <ellipse cx="62" cy="17" rx="6.5" ry="4" fill="#CC1000"/>
  <ellipse cx="62" cy="17" rx="4.5" ry="3" fill="#EE2000"/>
  <ellipse cx="62" cy="17" rx="2.5" ry="2" fill="#FF5030"/>
  <circle cx="62" cy="17" r="1.2" fill="#FF9060"/>
  <circle cx="60.5" cy="15.5" r="0.8" fill="#FFF" opacity="0.6"/>
  <ellipse cx="62" cy="17" rx="10" ry="7" fill="#FF1000" opacity="0.1"/>
</svg>
