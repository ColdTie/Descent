<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Lava ambient glow -->
  <circle cx="48" cy="54" r="46" fill="#FF4000" opacity="0.1"/>
  <!-- Ground shadow — large -->
  <ellipse cx="48" cy="93" rx="30" ry="5.5" fill="#000" opacity="0.45"/>

  <!-- FEET — heavy stone slabs -->
  <rect x="8" y="80" width="30" height="14" rx="4" fill="#2E2218"/>
  <rect x="58" y="80" width="30" height="14" rx="4" fill="#2E2218"/>
  <rect x="8" y="80" width="30" height="5" rx="3" fill="#3E3020" opacity="0.5"/>
  <!-- Foot cracks glowing -->
  <path d="M12,84 L18,92" stroke="#FF4800" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M26,82 L22,90" stroke="#FF3A00" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M66,84 L72,92" stroke="#FF4800" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M78,82 L74,90" stroke="#FF3A00" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- LEGS — stone pillars -->
  <rect x="10" y="56" width="28" height="26" rx="6" fill="#3C2E1C"/>
  <rect x="58" y="56" width="28" height="26" rx="6" fill="#3C2E1C"/>
  <rect x="10" y="56" width="10" height="26" rx="5" fill="#504030" opacity="0.4"/>
  <rect x="82" y="60" width="6" height="22" rx="3" fill="#1E1610" opacity="0.4"/>
  <!-- Leg lava cracks -->
  <path d="M14,60 Q18,70 14,80" stroke="#FF5000" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M24,58 Q28,68 24,78" stroke="#FF3800" stroke-width="1.5" fill="none" opacity="0.75"/>
  <path d="M68,60 Q72,70 68,80" stroke="#FF5000" stroke-width="2.5" fill="none" opacity="0.9"/>
  <!-- Lava glow pools on legs -->
  <circle cx="16" cy="70" r="3.5" fill="#FF4A00" opacity="0.8"/>
  <circle cx="70" cy="70" r="3.5" fill="#FF4A00" opacity="0.8"/>

  <!-- MASSIVE BODY BLOCK -->
  <rect x="6" y="24" width="84" height="34" rx="8" fill="#483820"/>
  <rect x="6" y="24" width="84" height="8" rx="6" fill="#604C28" opacity="0.4"/>
  <rect x="6" y="24" width="12" height="34" rx="7" fill="#604C28" opacity="0.3"/>
  <rect x="78" y="28" width="12" height="30" rx="6" fill="#2A1C0C" opacity="0.4"/>
  <rect x="6" y="50" width="84" height="8" rx="6" fill="#2A1C0C" opacity="0.35"/>
  <!-- Body facets / rock chips -->
  <path d="M6,24 L0,20 L10,22 Z" fill="#2A1C0C"/>
  <path d="M90,24 L96,20 L86,22 Z" fill="#2A1C0C"/>
  <rect x="8" y="26" width="6" height="6" rx="1" fill="#604C28" opacity="0.35"/>
  <rect x="82" y="26" width="6" height="6" rx="1" fill="#2A1C0C" opacity="0.4"/>
  <!-- BODY LAVA CRACK NETWORK -->
  <path d="M16,28 Q20,38 16,52" stroke="#FF5200" stroke-width="3" fill="none" opacity="0.92"/>
  <path d="M48,24 Q52,36 48,58" stroke="#FF6400" stroke-width="3.5" fill="none" opacity="0.95"/>
  <path d="M80,28 Q76,40 80,52" stroke="#FF4A00" stroke-width="3" fill="none" opacity="0.9"/>
  <path d="M18,40 Q48,44 78,40" stroke="#FF5000" stroke-width="2.5" fill="none" opacity="0.85"/>
  <path d="M22,50 Q40,54 56,50" stroke="#FF4000" stroke-width="2" fill="none" opacity="0.75"/>
  <!-- Lava glow pools at intersections -->
  <circle cx="20" cy="40" r="4.5" fill="#FF4800" opacity="0.85"/>
  <circle cx="48" cy="40" r="5" fill="#FF5600" opacity="0.9"/>
  <circle cx="76" cy="40" r="4" fill="#FF4400" opacity="0.82"/>
  <circle cx="36" cy="50" r="3" fill="#FF4A00" opacity="0.75"/>
  <circle cx="60" cy="50" r="3" fill="#FF4A00" opacity="0.75"/>
  <!-- Inner bright cores -->
  <circle cx="48" cy="40" r="2" fill="#FF9000" opacity="0.7"/>
  <circle cx="20" cy="40" r="1.5" fill="#FFAA00" opacity="0.7"/>
  <circle cx="76" cy="40" r="1.5" fill="#FFAA00" opacity="0.7"/>

  <!-- ARMS — wide stone slabs, hanging low -->
  <rect x="0" y="24" width="16" height="40" rx="5" fill="#3C2E1C"/>
  <rect x="0" y="24" width="5" height="40" rx="3" fill="#604C28" opacity="0.3"/>
  <rect x="80" y="24" width="16" height="40" rx="5" fill="#3C2E1C"/>
  <rect x="91" y="28" width="5" height="36" rx="3" fill="#1E1610" opacity="0.35"/>
  <!-- Arm cracks -->
  <path d="M2,28 Q6,42 2,58" stroke="#FF4A00" stroke-width="1.8" fill="none" opacity="0.8"/>
  <path d="M94,28 Q90,42 94,58" stroke="#FF4A00" stroke-width="1.8" fill="none" opacity="0.8"/>
  <circle cx="4" cy="44" r="2.5" fill="#FF4800" opacity="0.75"/>
  <circle cx="92" cy="44" r="2.5" fill="#FF4800" opacity="0.75"/>

  <!-- STONE FISTS -->
  <rect x="0" y="62" width="18" height="16" rx="4" fill="#2E2218"/>
  <rect x="78" y="62" width="18" height="16" rx="4" fill="#2E2218"/>
  <rect x="0" y="62" width="6" height="16" rx="3" fill="#3E3020" opacity="0.4"/>
  <!-- Fist cracks -->
  <path d="M3,66 L8,76" stroke="#FF4800" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M88,66 L84,76" stroke="#FF4800" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- NO NECK — head sits directly on body -->
  <rect x="28" y="18" width="40" height="8" rx="4" fill="#504028"/>
  <rect x="28" y="18" width="14" height="8" rx="4" fill="#604C30" opacity="0.35"/>

  <!-- HEAD — rectangular stone block -->
  <rect x="16" y="2" width="64" height="20" rx="6" fill="#5A4A2C"/>
  <rect x="16" y="2" width="64" height="6" rx="5" fill="#6E5C38" opacity="0.4"/>
  <rect x="16" y="2" width="12" height="20" rx="5" fill="#6E5C38" opacity="0.3"/>
  <rect x="68" y="6" width="12" height="16" rx="4" fill="#2A1C0C" opacity="0.4"/>
  <!-- Head rock chips -->
  <path d="M20,2 L16,0 L22,2 Z" fill="#2A1C0C"/>
  <path d="M76,2 L80,0 L74,2 Z" fill="#2A1C0C"/>
  <!-- Head lava cracks -->
  <path d="M26,4 Q30,12 28,20" stroke="#FF5200" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M68,4 Q64,12 66,20" stroke="#FF4800" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M30,4 Q48,8 66,4" stroke="#FF5000" stroke-width="2" fill="none" opacity="0.8"/>

  <!-- LAVA EYES — pools of molten rock -->
  <ellipse cx="34" cy="12" rx="9" ry="8" fill="#8A0E00"/>
  <ellipse cx="62" cy="12" rx="9" ry="8" fill="#8A0E00"/>
  <ellipse cx="34" cy="12" rx="7" ry="6" fill="#CC2400"/>
  <ellipse cx="62" cy="12" rx="7" ry="6" fill="#CC2400"/>
  <ellipse cx="34" cy="12" rx="5" ry="4" fill="#FF5000"/>
  <ellipse cx="62" cy="12" rx="5" ry="4" fill="#FF5000"/>
  <ellipse cx="34" cy="12" rx="3" ry="2.5" fill="#FF8800"/>
  <ellipse cx="62" cy="12" rx="3" ry="2.5" fill="#FF8800"/>
  <circle cx="34" cy="12" r="1.5" fill="#FFCC44"/>
  <circle cx="62" cy="12" r="1.5" fill="#FFCC44"/>
  <!-- Eye glow aura -->
  <ellipse cx="34" cy="12" rx="12" ry="10" fill="#FF4800" opacity="0.12"/>
  <ellipse cx="62" cy="12" rx="12" ry="10" fill="#FF4800" opacity="0.12"/>

  <!-- MOUTH — glowing lava slit -->
  <rect x="24" y="19" width="48" height="4" rx="1.5" fill="#780A00"/>
  <rect x="26" y="20" width="44" height="2" rx="1" fill="#FF4400" opacity="0.7"/>
</svg>
