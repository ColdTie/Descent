<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<defs>
  <linearGradient id="st" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#6A6878"/><stop offset="45%" stop-color="#4A4858"/><stop offset="100%" stop-color="#282630"/>
  </linearGradient>
  <linearGradient id="dk" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#383540"/><stop offset="100%" stop-color="#141318"/>
  </linearGradient>
  <linearGradient id="lv" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#FF3000"/><stop offset="50%" stop-color="#FF6020"/><stop offset="100%" stop-color="#FFA040"/>
  </linearGradient>
  <radialGradient id="cr" cx="50%" cy="50%">
    <stop offset="0%" stop-color="#FF8020"/><stop offset="50%" stop-color="#FF4000" stop-opacity="0.7"/><stop offset="100%" stop-color="#800000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ey" cx="50%" cy="40%">
    <stop offset="0%" stop-color="#FFA040"/><stop offset="50%" stop-color="#FF5000"/><stop offset="100%" stop-color="#400800"/>
  </radialGradient>
</defs>

<!-- Lava glow beneath -->
<circle cx="48" cy="54" r="46" fill="#FF4000" opacity="0.1"/>
<ellipse cx="48" cy="93" rx="30" ry="5.5" fill="#000" opacity="0.45"/>

<!-- FEET massive stone blocks -->
<rect x="14" y="82" width="28" height="12" rx="3" fill="url(#st)"/>
<rect x="54" y="82" width="28" height="12" rx="3" fill="url(#st)"/>
<rect x="14" y="82" width="10" height="12" rx="2" fill="#7A7888" opacity="0.3"/>
<rect x="78" y="84" width="8" height="10" rx="2" fill="#282630" opacity="0.4"/>
<!-- Lava crack in foot -->
<path d="M22,85 L18,92" stroke="url(#lv)" stroke-width="2.5"/>
<path d="M64,85 L68,92" stroke="url(#lv)" stroke-width="2.5"/>

<!-- LEGS massive stone pillars -->
<rect x="12" y="56" width="30" height="30" rx="5" fill="url(#st)"/>
<rect x="54" y="56" width="30" height="30" rx="5" fill="url(#st)"/>
<rect x="12" y="56" width="10" height="30" rx="4" fill="#7A7888" opacity="0.3"/>
<rect x="76" y="60" width="10" height="26" rx="4" fill="#282630" opacity="0.35"/>
<!-- Lava veins in legs -->
<path d="M20,60 L14,78" stroke="url(#lv)" stroke-width="3"/>
<path d="M26,58 L22,72 L18,82" stroke="url(#lv)" stroke-width="2"/>
<path d="M72,62 L78,76" stroke="url(#lv)" stroke-width="3"/>
<path d="M66,60 L70,74 L74,84" stroke="url(#lv)" stroke-width="2"/>
<!-- Glow from cracks -->
<path d="M20,60 L14,78" stroke="#FF8030" stroke-width="7" opacity="0.15"/>
<path d="M72,62 L78,76" stroke="#FF8030" stroke-width="7" opacity="0.15"/>

<!-- TORSO huge rectangular boulder -->
<rect x="8" y="18" width="80" height="44" rx="8" fill="url(#st)"/>
<rect x="8" y="18" width="26" height="44" rx="7" fill="#7A7888" opacity="0.28"/>
<rect x="66" y="22" width="22" height="40" rx="6" fill="#1E1C24" opacity="0.35"/>
<!-- Torso lava fissures major -->
<path d="M28,22 L22,38 L26,56" stroke="url(#lv)" stroke-width="4" stroke-linecap="round"/>
<path d="M26,22 L20,38 L24,56" stroke="#FF8030" stroke-width="8" opacity="0.12"/>
<path d="M48,20 L42,36 L48,50 L44,58" stroke="url(#lv)" stroke-width="3.5"/>
<path d="M48,20 L42,36 L48,50 L44,58" stroke="#FF8030" stroke-width="7" opacity="0.12"/>
<path d="M70,24 L74,40 L68,58" stroke="url(#lv)" stroke-width="3.5" stroke-linecap="round"/>
<path d="M70,24 L74,40 L68,58" stroke="#FF8030" stroke-width="7" opacity="0.12"/>
<!-- Minor cracks -->
<path d="M36,28 L32,42" stroke="url(#lv)" stroke-width="1.5"/>
<path d="M60,26 L64,44" stroke="url(#lv)" stroke-width="1.5"/>
<path d="M18,34 L24,44" stroke="url(#lv)" stroke-width="1.5"/>

<!-- ARMS massive slabs -->
<rect x="-4" y="14" width="24" height="40" rx="7" fill="url(#st)"/>
<rect x="-4" y="14" width="8" height="40" rx="5" fill="#7A7888" opacity="0.3"/>
<rect x="76" y="14" width="24" height="40" rx="7" fill="url(#st)"/>
<rect x="92" y="18" width="8" height="36" rx="4" fill="#1E1C24" opacity="0.35"/>
<!-- Arm lava cracks -->
<path d="M4,18 L0,34 L4,50" stroke="url(#lv)" stroke-width="3"/>
<path d="M4,18 L0,34 L4,50" stroke="#FF8030" stroke-width="6" opacity="0.12"/>
<path d="M88,20 L92,36 L88,52" stroke="url(#lv)" stroke-width="3"/>
<path d="M88,20 L92,36 L88,52" stroke="#FF8030" stroke-width="6" opacity="0.12"/>

<!-- FISTS stone blocks -->
<rect x="-2" y="52" width="22" height="18" rx="5" fill="url(#dk)"/>
<rect x="-2" y="52" width="7" height="18" rx="4" fill="#484558" opacity="0.4"/>
<rect x="76" y="52" width="22" height="18" rx="5" fill="url(#dk)"/>
<rect x="91" y="56" width="7" height="14" rx="3" fill="#141318" opacity="0.4"/>
<!-- Fist glow knuckles -->
<circle cx="3" cy="56" r="4" fill="url(#cr)" opacity="0.7"/>
<circle cx="3" cy="63" r="3.5" fill="url(#cr)" opacity="0.5"/>
<circle cx="92" cy="56" r="4" fill="url(#cr)" opacity="0.7"/>
<circle cx="92" cy="63" r="3.5" fill="url(#cr)" opacity="0.5"/>

<!-- HEAD large rectangular stone -->
<rect x="20" y="0" width="56" height="22" rx="8" fill="url(#st)"/>
<rect x="20" y="0" width="18" height="22" rx="7" fill="#7A7888" opacity="0.28"/>
<rect x="64" y="4" width="12" height="18" rx="5" fill="#1E1C24" opacity="0.35"/>
<!-- Head cracks -->
<path d="M36,2 L30,18" stroke="url(#lv)" stroke-width="2.5"/>
<path d="M36,2 L30,18" stroke="#FF8030" stroke-width="6" opacity="0.15"/>
<path d="M58,4 L62,20" stroke="url(#lv)" stroke-width="2"/>

<!-- EYE SOCKETS two orange glowing -->
<ellipse cx="34" cy="12" rx="10" ry="7" fill="#0A0806"/>
<ellipse cx="34" cy="12" rx="8" ry="5.5" fill="#200A00"/>
<ellipse cx="34" cy="12" rx="6" ry="4" fill="url(#ey)"/>
<circle cx="34" cy="12" r="3" fill="#FF8020"/>
<circle cx="34" cy="12" r="1.5" fill="#FFB060"/>
<circle cx="32.5" cy="10.5" r="1" fill="#FFCC80" opacity="0.9"/>
<!-- Eye glow halos -->
<ellipse cx="34" cy="12" rx="12" ry="9" fill="#FF6010" opacity="0.18"/>

<ellipse cx="62" cy="12" rx="10" ry="7" fill="#0A0806"/>
<ellipse cx="62" cy="12" rx="8" ry="5.5" fill="#200A00"/>
<ellipse cx="62" cy="12" rx="6" ry="4" fill="url(#ey)"/>
<circle cx="62" cy="12" r="3" fill="#FF8020"/>
<circle cx="62" cy="12" r="1.5" fill="#FFB060"/>
<circle cx="60.5" cy="10.5" r="1" fill="#FFCC80" opacity="0.9"/>
<ellipse cx="62" cy="12" rx="12" ry="9" fill="#FF6010" opacity="0.18"/>

<!-- MOUTH opening (lava glow inside) -->
<rect x="28" y="17" width="40" height="6" rx="2" fill="#0A0806"/>
<rect x="30" y="18" width="36" height="4" rx="1.5" fill="#200A00"/>
<path d="M30,19 Q48,24 66,19" fill="url(#lv)" opacity="0.8"/>
<!-- Teeth of stone -->
<rect x="32" y="17" width="4" height="4" rx="1" fill="#4A4858"/>
<rect x="38" y="17" width="4" height="4" rx="1" fill="#4A4858"/>
<rect x="44" y="17" width="4" height="4" rx="1" fill="#4A4858"/>
<rect x="50" y="17" width="4" height="4" rx="1" fill="#4A4858"/>
<rect x="56" y="17" width="4" height="4" rx="1" fill="#4A4858"/>
<rect x="62" y="17" width="4" height="4" rx="1" fill="#4A4858"/>
</svg>
