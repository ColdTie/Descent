<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<defs>
  <linearGradient id="sk" x1="25%" y1="0%" x2="75%" y2="100%">
    <stop offset="0%" stop-color="#E0D0B0"/><stop offset="45%" stop-color="#C4A878"/><stop offset="100%" stop-color="#907848"/>
  </linearGradient>
  <linearGradient id="rb" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#3A2888"/><stop offset="50%" stop-color="#221A60"/><stop offset="100%" stop-color="#100C30"/>
  </linearGradient>
  <linearGradient id="ht" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#4030A0"/><stop offset="100%" stop-color="#180E50"/>
  </linearGradient>
  <linearGradient id="sf" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#C09840"/><stop offset="50%" stop-color="#8A6820"/><stop offset="100%" stop-color="#5A4010"/>
  </linearGradient>
  <linearGradient id="bt" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#1E1440"/><stop offset="100%" stop-color="#080618"/>
  </linearGradient>
  <radialGradient id="mg" cx="50%" cy="50%">
    <stop offset="0%" stop-color="#A060FF" stop-opacity="0.9"/><stop offset="60%" stop-color="#4020A0" stop-opacity="0.6"/><stop offset="100%" stop-color="#0A0030" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ey" cx="38%" cy="35%">
    <stop offset="0%" stop-color="#80C0FF"/><stop offset="50%" stop-color="#2060C0"/><stop offset="100%" stop-color="#040818"/>
  </radialGradient>
</defs>

<!-- Magic aura glow -->
<circle cx="48" cy="50" r="38" fill="url(#mg)" opacity="0.35"/>

<ellipse cx="44" cy="93" rx="20" ry="4" fill="#200840" opacity="0.35"/>

<!-- STAFF (behind body) -->
<rect x="14" y="4" width="6" height="78" rx="3" fill="url(#sf)"/>
<rect x="15.5" y="6" width="2" height="72" rx="1" fill="#D8B850" opacity="0.5"/>
<!-- Staff orb top -->
<circle cx="17" cy="6" r="8" fill="#2030A0" opacity="0.9"/>
<circle cx="17" cy="6" r="6" fill="#4060D0"/>
<circle cx="17" cy="6" r="4" fill="#80A0FF"/>
<circle cx="17" cy="6" r="2" fill="#C0D8FF"/>
<circle cx="15.5" cy="4.5" r="1.2" fill="white" opacity="0.85"/>
<!-- Orb glow -->
<circle cx="17" cy="6" r="12" fill="#3050C0" opacity="0.2"/>

<!-- BOOTS -->
<rect x="28" y="82" width="16" height="10" rx="3" fill="url(#bt)"/>
<rect x="52" y="82" width="16" height="10" rx="3" fill="url(#bt)"/>
<rect x="30" y="83" width="6" height="2" rx="1" fill="#2A1A50" opacity="0.55"/>
<rect x="54" y="83" width="6" height="2" rx="1" fill="#2A1A50" opacity="0.55"/>

<!-- ROBE lower (A-line flare) -->
<path d="M26,55 L18,92 L78,92 L70,55 Z" fill="url(#rb)"/>
<rect x="26" y="55" width="5" height="37" fill="#32208A" opacity="0.35"/>
<rect x="65" y="55" width="5" height="37" fill="#10084A" opacity="0.35"/>
<!-- Robe hem gold trim -->
<rect x="18" y="88" width="60" height="3" rx="1" fill="#8A6820" opacity="0.8"/>
<rect x="18" y="90" width="60" height="2" rx="1" fill="#C09840" opacity="0.6"/>

<!-- TORSO robe -->
<path d="M24,28 C22,30 21,40 21,57 L75,57 C75,40 74,30 72,28 Z" fill="url(#rb)"/>
<!-- Robe shading sides -->
<rect x="21" y="30" width="8" height="26" rx="4" fill="#40309A" opacity="0.3"/>
<rect x="67" y="30" width="8" height="26" rx="4" fill="#100840" opacity="0.35"/>
<!-- Rune symbol on chest -->
<circle cx="48" cy="42" r="8" fill="#2820A0" opacity="0.8"/>
<circle cx="48" cy="42" r="6" fill="#3028B8"/>
<path d="M48,36 L50,41 L55,41 L51,44 L53,49 L48,46 L43,49 L45,44 L41,41 L46,41 Z" fill="#A0C0FF" opacity="0.9"/>
<!-- Robe belt/sash -->
<rect x="22" y="52" width="52" height="7" rx="3" fill="#1A1058"/>
<rect x="42" y="51" width="12" height="9" rx="3" fill="#2820A0"/>
<rect x="43" y="52" width="10" height="7" rx="2" fill="#4038C8"/>

<!-- ARMS robe sleeves wide -->
<path d="M8,30 C6,32 5,44 8,58 L22,58 C20,44 20,32 22,30 Z" fill="url(#rb)"/>
<path d="M88,30 C90,32 91,44 88,58 L74,58 C76,44 76,32 74,30 Z" fill="url(#rb)"/>

<!-- HANDS -->
<ellipse cx="14" cy="60" rx="7" ry="5" fill="url(#sk)"/>
<ellipse cx="82" cy="60" rx="7" ry="5" fill="url(#sk)"/>
<!-- Magic sparks on right hand -->
<circle cx="87" cy="56" r="2.5" fill="#80C0FF" opacity="0.9"/>
<circle cx="84" cy="52" r="1.5" fill="#A0D0FF" opacity="0.8"/>
<circle cx="90" cy="54" r="1.8" fill="#60A0FF" opacity="0.7"/>

<!-- NECK -->
<rect x="41" y="21" width="14" height="10" rx="5" fill="url(#sk)"/>

<!-- POINTED HAT -->
<path d="M36,18 L48,0 L60,18 Z" fill="url(#ht)"/>
<path d="M36,18 L48,2 L60,18" fill="#2018A0" opacity="0.4"/>
<path d="M38,18 L48,2" stroke="#6050D0" stroke-width="1" opacity="0.4" fill="none"/>
<!-- Hat brim -->
<rect x="28" y="16" width="40" height="6" rx="8" fill="url(#ht)"/>
<rect x="28" y="16" width="40" height="2" rx="4" fill="#6050D0" opacity="0.4"/>
<!-- Hat star -->
<circle cx="44" cy="9" r="2" fill="#A0D0FF" opacity="0.8"/>
<!-- Hat band -->
<rect x="30" y="18" width="36" height="3" rx="1" fill="#8A6820" opacity="0.8"/>
<rect x="30" y="18" width="36" height="1.5" rx="1" fill="#C09840" opacity="0.6"/>

<!-- HEAD -->
<ellipse cx="48" cy="22" rx="17" ry="15" fill="url(#sk)"/>
<ellipse cx="58" cy="24" rx="8" ry="10" fill="#D0C090" opacity="0.15"/>

<!-- EYES arcane blue -->
<ellipse cx="41" cy="21" rx="5" ry="4.5" fill="#0A0818"/>
<ellipse cx="41" cy="21" rx="3.5" ry="3" fill="#0A1840"/>
<circle cx="41" cy="21" r="2.3" fill="url(#ey)"/>
<circle cx="41" cy="21" r="1.2" fill="#040818"/>
<circle cx="39.8" cy="19.8" r="1.0" fill="white" opacity="0.85"/>

<ellipse cx="55" cy="21" rx="5" ry="4.5" fill="#0A0818"/>
<ellipse cx="55" cy="21" rx="3.5" ry="3" fill="#0A1840"/>
<circle cx="55" cy="21" r="2.3" fill="url(#ey)"/>
<circle cx="55" cy="21" r="1.2" fill="#040818"/>
<circle cx="53.8" cy="19.8" r="1.0" fill="white" opacity="0.85"/>

<!-- EYEBROWS thin arched -->
<path d="M37,17 Q41,14 45,17" stroke="#6A5830" stroke-width="1.5" fill="none"/>
<path d="M51,17 Q55,14 59,17" stroke="#6A5830" stroke-width="1.5" fill="none"/>

<!-- NOSE fine -->
<path d="M47,24 C47,26.5 49,26.5 49,24" stroke="#987848" stroke-width="1.2" fill="none"/>

<!-- MOUTH slight smile -->
<path d="M42,30 C46,33 50,33 54,30" stroke="#7A5830" stroke-width="1.6" fill="none"/>

<!-- BEARD/goatee -->
<path d="M44,32 Q48,36 52,32" stroke="#B09050" stroke-width="1.5" fill="none"/>
<path d="M46,33 Q48,38 50,33" stroke="#A07840" stroke-width="2" fill="none"/>
</svg>
