<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Orb glow -->
  <circle cx="54" cy="11" r="11" fill="#6060FF" opacity="0.18"/>
  <circle cx="54" cy="11" r="7" fill="#8888FF" opacity="0.28"/>
  <!-- Shadow -->
  <ellipse cx="30" cy="61" rx="14" ry="3.5" fill="#000" opacity="0.25"/>
  <!-- Robe body -->
  <path d="M20,40 Q16,54 18,64 L46,64 Q48,54 44,40 Z" fill="#1A2468"/>
  <!-- Robe front highlight -->
  <path d="M22,40 Q18,54 20,64 L44,64 Q46,54 42,40 Z" fill="#1E2A74"/>
  <!-- Robe trim gold -->
  <path d="M20,40 L18,64" stroke="#8A7020" stroke-width="1.5" fill="none"/>
  <path d="M44,40 L46,64" stroke="#8A7020" stroke-width="1.5" fill="none"/>
  <!-- Star motifs -->
  <circle cx="32" cy="50" r="1.5" fill="#4A5AA8" opacity="0.6"/>
  <circle cx="28" cy="57" r="1" fill="#4A5AA8" opacity="0.5"/>
  <circle cx="36" cy="57" r="1" fill="#4A5AA8" opacity="0.5"/>
  <!-- Belt -->
  <rect x="20" y="43" width="24" height="3" rx="1" fill="#8A7020"/>
  <rect x="30" y="42.5" width="4" height="4" rx="1" fill="#C0A030"/>
  <!-- Left sleeve -->
  <rect x="11" y="38" width="10" height="14" rx="5" fill="#1E2A74"/>
  <!-- Left hand casting glow -->
  <circle cx="14" cy="54" r="5" fill="#C8A878"/>
  <circle cx="14" cy="54" r="3.5" fill="#6060E0" opacity="0.45"/>
  <circle cx="11" cy="50" r="1.5" fill="#8888FF" opacity="0.7"/>
  <circle cx="8" cy="56" r="1" fill="#AAAAFF" opacity="0.55"/>
  <!-- Pointed hat -->
  <polygon points="32,2 20,22 44,22" fill="#131348"/>
  <polygon points="32,2 22,22 42,22" fill="#191960"/>
  <!-- Hat stars -->
  <circle cx="32" cy="12" r="1" fill="#6868E0" opacity="0.6"/>
  <circle cx="28" cy="18" r="0.7" fill="#6868E0" opacity="0.4"/>
  <!-- Hat brim -->
  <rect x="17" y="21" width="30" height="4" rx="2" fill="#131348"/>
  <!-- Hat band gold -->
  <rect x="18" y="22" width="28" height="2" rx="1" fill="#8A7020"/>
  <!-- Head -->
  <circle cx="32" cy="31" r="9.5" fill="#C8A070"/>
  <!-- Beard white -->
  <ellipse cx="32" cy="38" rx="6.5" ry="4" fill="#C8C0A0"/>
  <!-- Bushy eyebrows -->
  <rect x="24" y="27.5" width="6" height="2" rx="1" fill="#5A4020"/>
  <rect x="34" y="27.5" width="6" height="2" rx="1" fill="#5A4020"/>
  <!-- Eyes - piercing blue -->
  <circle cx="27" cy="31" r="2.5" fill="#E8E8E0"/>
  <circle cx="37" cy="31" r="2.5" fill="#E8E8E0"/>
  <circle cx="27" cy="31" r="1.5" fill="#4060D0"/>
  <circle cx="37" cy="31" r="1.5" fill="#4060D0"/>
  <circle cx="27.5" cy="30.5" r="0.6" fill="#FFFFFF"/>
  <circle cx="37.5" cy="30.5" r="0.6" fill="#FFFFFF"/>
  <!-- Staff -->
  <rect x="51" y="16" width="3" height="46" rx="1.5" fill="#6A4818"/>
  <!-- Staff orb -->
  <circle cx="52.5" cy="11" r="7" fill="#2828A8" opacity="0.55"/>
  <circle cx="52.5" cy="11" r="5" fill="#5050CC"/>
  <circle cx="52.5" cy="11" r="3" fill="#8888FF"/>
  <circle cx="51" cy="9.5" r="1.2" fill="#FFFFFF" opacity="0.9"/>
  <!-- Magic particles -->
  <circle cx="46" cy="14" r="1.2" fill="#8888FF" opacity="0.7"/>
  <circle cx="58" cy="19" r="1" fill="#6666DD" opacity="0.6"/>
  <circle cx="44" cy="21" r="0.8" fill="#AAAAFF" opacity="0.5"/>
</svg>
