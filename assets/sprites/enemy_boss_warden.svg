<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<defs>
  <linearGradient id="ir" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#4A4A5A"/><stop offset="45%" stop-color="#2E2E3C"/><stop offset="100%" stop-color="#141420"/>
  </linearGradient>
  <linearGradient id="gd" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#D0A030"/><stop offset="45%" stop-color="#A07820"/><stop offset="100%" stop-color="#604810"/>
  </linearGradient>
  <linearGradient id="sk" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#C89060"/><stop offset="50%" stop-color="#A06838"/><stop offset="100%" stop-color="#6A3C18"/>
  </linearGradient>
  <linearGradient id="ch" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#C09020"/><stop offset="50%" stop-color="#D0A830"/><stop offset="100%" stop-color="#C09020"/>
  </linearGradient>
  <radialGradient id="ey" cx="40%" cy="35%">
    <stop offset="0%" stop-color="#A0D0FF"/><stop offset="50%" stop-color="#4080C0"/><stop offset="100%" stop-color="#081030"/>
  </radialGradient>
</defs>

<!-- Rune glow green -->
<circle cx="48" cy="54" r="46" fill="#003A10" opacity="0.15"/>
<ellipse cx="48" cy="93" rx="34" ry="5" fill="#000" opacity="0.45"/>

<!-- MASSIVE TOWER SHIELD (left side) -->
<rect x="2" y="18" width="28" height="60" rx="5" fill="url(#ir)"/>
<rect x="2" y="18" width="9" height="60" rx="4" fill="#5A5A6A" opacity="0.3"/>
<rect x="21" y="22" width="9" height="56" rx="3" fill="#0E0E1A" opacity="0.35"/>
