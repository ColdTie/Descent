<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Rune ambient glow -->
  <circle cx="48" cy="54" r="46" fill="#003A10" opacity="0.15"/>
  <!-- Ground shadow — very wide (massive boss) -->
  <ellipse cx="48" cy="93" rx="34" ry="5" fill="#000" opacity="0.45"/>

  <!-- FEET — stone slabs, wide -->
  <rect x="4" y="78" width="34" height="16" rx="4" fill="#222E26"/>
  <rect x="58" y="78" width="34" height="16" rx="4" fill="#222E26"/>
  <rect x="4" y="78" width="34" height="5" rx="3" fill="#2E3E32" opacity="0.45"/>
  <!-- Foot rune cracks -->
  <path d="M10,82 L16,92" stroke="#30D060" stroke-width="2.5" fill="none" opacity="0.85"/>
  <path d="M26,80 L22,90" stroke="#28B850" stroke-width="2" fill="none" opacity="0.75"/>
  <path d="M66,82 L72,92" stroke="#30D060" stroke-width="2.5" fill="none" opacity="0.85"/>
  <path d="M80,80 L76,90" stroke="#28B850" stroke-width="2" fill="none" opacity="0.75"/>

  <!-- LEGS — massive stone columns -->
  <rect x="4" y="48" width="34" height="32" rx="7" fill="#2A3A2E"/>
  <rect x="58" y="48" width="34" height="32" rx="7" fill="#2A3A2E"/>
  <rect x="4" y="48" width="10" height="32" rx="6" fill="#384E3C" opacity="0.35"/>
  <rect x="88" y="52" width="6" height="28" rx="3" fill="#161E18" opacity="0.4"/>
  <!-- Leg rune carvings glowing -->
  <path d="M10,52 Q14,62 10,74" stroke="#2CC050" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M22,50 L26,78" stroke="#24A040" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M70,52 Q74,62 70,74" stroke="#2CC050" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M82,50 L78,78" stroke="#24A040" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- Rune glow circles on legs -->
  <circle cx="12" cy="62" r="4" fill="#30D060" opacity="0.7"/>
  <circle cx="72" cy="62" r="4" fill="#30D060" opacity="0.7"/>
  <!-- Mossy patches on legs -->
  <ellipse cx="18" cy="58" rx="6" ry="4" fill="#1A4820" opacity="0.5"/>
  <ellipse cx="76" cy="64" rx="5" ry="3" fill="#1A4820" opacity="0.5"/>

  <!-- CHAINS — wrapped around torso -->
  <!-- Chain links left side -->
  <rect x="2" y="42" width="20" height="5" rx="2" fill="#6A5438"/>
  <rect x="6" y="47" width="5" height="8" rx="2" fill="#6A5438"/>
  <rect x="14" y="47" width="5" height="8" rx="2" fill="#6A5438"/>
  <rect x="4" y="55" width="15" height="4" rx="2" fill="#5A4428"/>
  <!-- Chain links right side -->
  <rect x="74" y="42" width="20" height="5" rx="2" fill="#6A5438"/>
  <rect x="75" y="47" width="5" height="8" rx="2" fill="#6A5438"/>
  <rect x="83" y="47" width="5" height="8" rx="2" fill="#6A5438"/>
  <rect x="77" y="55" width="15" height="4" rx="2" fill="#5A4428"/>
  <!-- Chain anchor rings -->
  <circle cx="8" cy="48" r="4" fill="#7A6448" opacity="0.8"/>
  <circle cx="88" cy="48" r="4" fill="#7A6448" opacity="0.8"/>
  <!-- Glowing rune on chains -->
  <circle cx="10" cy="48" r="2" fill="#2CC050" opacity="0.6"/>
  <circle cx="86" cy="48" r="2" fill="#2CC050" opacity="0.6"/>

  <!-- MASSIVE BODY BLOCK -->
  <rect x="6" y="18" width="84" height="32" rx="8" fill="#2E3E32"/>
  <rect x="6" y="18" width="84" height="8" rx="6" fill="#3C5240" opacity="0.4"/>
  <rect x="6" y="18" width="12" height="32" rx="7" fill="#3C5240" opacity="0.3"/>
  <rect x="78" y="22" width="12" height="28" rx="6" fill="#161E18" opacity="0.4"/>
  <!-- Rock facets -->
  <path d="M6,18 L0,14 L10,16 Z" fill="#161E18"/>
  <path d="M90,18 L96,14 L86,16 Z" fill="#161E18"/>
  <!-- Moss patches on body -->
  <ellipse cx="24" cy="30" rx="10" ry="6" fill="#1A4820" opacity="0.55"/>
  <ellipse cx="68" cy="36" rx="8" ry="5" fill="#1A4820" opacity="0.5"/>
  <ellipse cx="48" cy="42" rx="12" ry="5" fill="#1A4820" opacity="0.45"/>
  <!-- Body rune network — glowing green -->
  <path d="M16,22 Q20,30 16,46" stroke="#2EC850" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M48,18 Q52,28 48,50" stroke="#30D060" stroke-width="3" fill="none" opacity="0.95"/>
  <path d="M78,22 Q74,32 78,46" stroke="#2CC050" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M18,34 Q48,38 78,34" stroke="#28B040" stroke-width="2" fill="none" opacity="0.85"/>
  <!-- Rune glow pools -->
  <circle cx="20" cy="34" r="5" fill="#30D060" opacity="0.8"/>
  <circle cx="48" cy="34" r="6" fill="#38E870" opacity="0.85"/>
  <circle cx="76" cy="34" r="5" fill="#30D060" opacity="0.8"/>
  <!-- Inner bright -->
  <circle cx="48" cy="34" r="2.5" fill="#80FF80" opacity="0.7"/>
  <circle cx="20" cy="34" r="2" fill="#60FF60" opacity="0.65"/>
  <circle cx="76" cy="34" r="2" fill="#60FF60" opacity="0.65"/>

  <!-- ARMS — ENORMOUS stone slabs -->
  <rect x="0" y="16" width="14" height="40" rx="5" fill="#2A3A2E"/>
  <rect x="0" y="16" width="5" height="40" rx="3" fill="#3C5240" opacity="0.3"/>
  <rect x="82" y="16" width="14" height="40" rx="5" fill="#2A3A2E"/>
  <rect x="91" y="20" width="5" height="36" rx="3" fill="#161E18" opacity="0.35"/>
  <!-- Arm runes -->
  <path d="M2,22 Q6,36 2,52" stroke="#28B840" stroke-width="2" fill="none" opacity="0.8"/>
  <path d="M94,22 Q90,36 94,52" stroke="#28B840" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Arm mossy patches -->
  <ellipse cx="6" cy="36" rx="5" ry="3" fill="#1A4820" opacity="0.5"/>
  <ellipse cx="90" cy="36" rx="5" ry="3" fill="#1A4820" opacity="0.5"/>

  <!-- FISTS — enormous stone boulders -->
  <rect x="0" y="54" width="18" height="18" rx="5" fill="#1E2E22"/>
  <rect x="78" y="54" width="18" height="18" rx="5" fill="#1E2E22"/>
  <rect x="0" y="54" width="6" height="18" rx="3" fill="#2A3E2E" opacity="0.3"/>
  <!-- Fist rune cracks -->
  <path d="M2,58 L8,70" stroke="#28D050" stroke-width="2.5" fill="none" opacity="0.8"/>
  <path d="M88,58 L84,70" stroke="#28D050" stroke-width="2.5" fill="none" opacity="0.8"/>

  <!-- NO NECK — head directly on body -->
  <rect x="28" y="12" width="40" height="8" rx="4" fill="#303E34"/>

  <!-- HEAD — massive stone block face -->
  <rect x="14" y="2" width="68" height="14" rx="6" fill="#38503C"/>
  <rect x="14" y="2" width="68" height="5" rx="4" fill="#486050" opacity="0.4"/>
  <rect x="14" y="2" width="12" height="14" rx="5" fill="#486050" opacity="0.3"/>
  <!-- Head stone chips -->
  <path d="M18,2 L14,0 L22,2 Z" fill="#161E18"/>
  <path d="M78,2 L82,0 L74,2 Z" fill="#161E18"/>
  <!-- Head rune cracks -->
  <path d="M26,4 Q30,10 28,16" stroke="#2EC850" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M68,4 Q64,10 66,16" stroke="#2CC050" stroke-width="2.5" fill="none" opacity="0.9"/>
  <path d="M30,4 Q48,8 66,4" stroke="#28A840" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Mossy growth on head -->
  <ellipse cx="48" cy="4" rx="14" ry="3" fill="#1A4820" opacity="0.5"/>

  <!-- GLOWING GREEN RUNE EYES -->
  <ellipse cx="32" cy="10" rx="9" ry="7" fill="#0A1A0E"/>
  <ellipse cx="64" cy="10" rx="9" ry="7" fill="#0A1A0E"/>
  <ellipse cx="32" cy="10" rx="7" ry="5.5" fill="#148030"/>
  <ellipse cx="64" cy="10" rx="7" ry="5.5" fill="#148030"/>
  <ellipse cx="32" cy="10" rx="5" ry="4" fill="#20C050"/>
  <ellipse cx="64" cy="10" rx="5" ry="4" fill="#20C050"/>
  <ellipse cx="32" cy="10" rx="3" ry="2.5" fill="#40E870"/>
  <ellipse cx="64" cy="10" rx="3" ry="2.5" fill="#40E870"/>
  <circle cx="32" cy="10" r="1.5" fill="#A0FFA0"/>
  <circle cx="64" cy="10" r="1.5" fill="#A0FFA0"/>
  <!-- Rune symbol in each eye -->
  <rect x="31.2" y="8" width="1.6" height="5" rx="0.5" fill="#0A1A0E" opacity="0.5"/>
  <rect x="30" y="10" width="4" height="1.2" rx="0.4" fill="#0A1A0E" opacity="0.5"/>
  <rect x="63.2" y="8" width="1.6" height="5" rx="0.5" fill="#0A1A0E" opacity="0.5"/>
  <rect x="62" y="10" width="4" height="1.2" rx="0.4" fill="#0A1A0E" opacity="0.5"/>
  <!-- Eye glow aura -->
  <ellipse cx="32" cy="10" rx="13" ry="10" fill="#30D060" opacity="0.14"/>
  <ellipse cx="64" cy="10" rx="13" ry="10" fill="#30D060" opacity="0.14"/>

  <!-- MOUTH — wide stone slit -->
  <rect x="22" y="14" width="52" height="4" rx="1.5" fill="#0E1810"/>
  <rect x="24" y="15" width="48" height="1.5" rx="0.5" fill="#2CC050" opacity="0.45"/>
</svg>
