<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
<defs>
  <linearGradient id="bn" x1="20%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%" stop-color="#E0D8C0"/><stop offset="45%" stop-color="#C8C0A0"/><stop offset="100%" stop-color="#907C60"/>
  </linearGradient>
  <linearGradient id="ar" x1="15%" y1="0%" x2="85%" y2="100%">
    <stop offset="0%" stop-color="#5A4830"/><stop offset="50%" stop-color="#3A3020"/><stop offset="100%" stop-color="#1A1408"/>
  </linearGradient>
  <linearGradient id="sw" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#D8D8E8"/><stop offset="40%" stop-color="#A8A8C0"/><stop offset="100%" stop-color="#505068"/>
  </linearGradient>
  <radialGradient id="ey" cx="50%" cy="40%">
    <stop offset="0%" stop-color="#60FF80"/><stop offset="50%" stop-color="#20A040"/><stop offset="100%" stop-color="#004010"/>
  </radialGradient>
</defs>

<!-- Soul aura cold blue -->
<circle cx="48" cy="48" r="40" fill="#0010A0" opacity="0.07"/>
<ellipse cx="48" cy="93" rx="16" ry="4" fill="#000" opacity="0.25"/>

<!-- SWORD raised right hand -->
<rect x="72" y="4" width="6" height="60" rx="2" fill="url(#sw)" transform="rotate(10,75,34)"/>
<rect x="73.5" y="6" width="2.5" height="56" rx="1" fill="#E0E0F0" opacity="0.55" transform="rotate(10,75,34)"/>
<rect x="68" y="52" width="16" height="5" rx="2" fill="#8A7030" transform="rotate(10,76,54)"/>
