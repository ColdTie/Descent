<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shadow -->
  <ellipse cx="32" cy="62" rx="12" ry="3" fill="#000" opacity="0.25"/>
  <!-- Sword raised -->
  <rect x="48" y="2" width="3" height="28" rx="1.5" fill="#B8B8C8"/>
  <!-- Fuller groove -->
  <rect x="49.5" y="4" width="1" height="24" rx="0.5" fill="#D8D8E8" opacity="0.65"/>
  <!-- Crossguard -->
  <rect x="43" y="18" width="13" height="3" rx="1.5" fill="#8A7830"/>
  <!-- Grip -->
  <rect x="48" y="16" width="3" height="5" rx="1.5" fill="#6A5028"/>
  <!-- Pommel -->
  <circle cx="49.5" cy="16" r="2.5" fill="#8A7830"/>
  <!-- Cranium -->
  <ellipse cx="32" cy="17" rx="11" ry="10" fill="#EDE4C8"/>
  <!-- Jaw -->
  <rect x="24" y="23" width="16" height="8" rx="3" fill="#E0D8B8"/>
  <rect x="26" y="28" width="12" height="4" rx="2" fill="#D0C8A8"/>
  <!-- Eye sockets - deep -->
  <ellipse cx="27" cy="17" rx="4.5" ry="5" fill="#1A1A10"/>
  <ellipse cx="37" cy="17" rx="4.5" ry="5" fill="#1A1A10"/>
  <!-- Soul fire -->
  <circle cx="27" cy="17" r="2.2" fill="#CC2000" opacity="0.85"/>
  <circle cx="37" cy="17" r="2.2" fill="#CC2000" opacity="0.85"/>
  <circle cx="27" cy="17" r="1.1" fill="#FF6000" opacity="0.75"/>
  <circle cx="37" cy="17" r="1.1" fill="#FF6000" opacity="0.75"/>
  <!-- Nasal cavity -->
  <path d="M30,22 L32,20 L34,22 L33,24 L31,24 Z" fill="#1A1A10"/>
  <!-- Teeth -->
  <rect x="25" y="25" width="2.5" height="4.5" rx="0.5" fill="#C8C0A0"/>
  <rect x="28.5" y="25" width="2.5" height="4.5" rx="0.5" fill="#C8C0A0"/>
  <rect x="32" y="25" width="2.5" height="4.5" rx="0.5" fill="#C8C0A0"/>
  <rect x="35.5" y="25" width="2.5" height="4.5" rx="0.5" fill="#C8C0A0"/>
  <!-- Neck vertebra -->
  <rect x="29" y="32" width="6" height="4" rx="2" fill="#D8D0B0"/>
  <!-- Ribcage -->
  <rect x="24" y="36" width="16" height="2.5" rx="1" fill="#DDD8C0"/>
  <rect x="23" y="40" width="18" height="2.5" rx="1" fill="#DDD8C0"/>
  <rect x="24" y="44" width="16" height="2.5" rx="1" fill="#DDD8C0"/>
  <!-- Spine -->
  <rect x="30" y="35" width="4" height="20" rx="2" fill="#CCC4A8"/>
  <!-- Pelvis -->
  <rect x="24" y="52" width="16" height="5" rx="2" fill="#C8C0A0"/>
  <!-- Left arm - defense position -->
  <rect x="12" y="36" width="13" height="4" rx="2" fill="#DDD8C0"/>
  <rect x="10" y="38" width="6" height="12" rx="3" fill="#D0C8A8"/>
  <!-- Left finger bones -->
  <rect x="9" y="49" width="2" height="5" rx="1" fill="#C8C0A0"/>
  <rect x="12" y="49" width="2" height="5" rx="1" fill="#C8C0A0"/>
  <rect x="15" y="49" width="2" height="5" rx="1" fill="#C8C0A0"/>
  <!-- Right arm - weapon arm -->
  <rect x="39" y="34" width="13" height="4" rx="2" fill="#DDD8C0"/>
  <rect x="46" y="27" width="6" height="12" rx="3" fill="#D0C8A8"/>
  <!-- Leg bones -->
  <rect x="24" y="56" width="6" height="8" rx="2" fill="#C8C0A0"/>
  <rect x="34" y="56" width="6" height="8" rx="2" fill="#C8C0A0"/>
</svg>
