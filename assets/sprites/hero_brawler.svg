<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Ground shadow -->
  <ellipse cx="48" cy="93" rx="22" ry="4" fill="#000" opacity="0.3"/>

  <!-- BOOTS -->
  <rect x="28" y="82" width="19" height="9" rx="3" fill="#100A04"/>
  <rect x="49" y="82" width="19" height="9" rx="3" fill="#100A04"/>
  <rect x="28" y="82" width="19" height="3" rx="2" fill="#201408" opacity="0.6"/>

  <!-- JEANS / LEGS -->
  <rect x="30" y="58" width="15" height="26" rx="4" fill="#1C2B4E"/>
  <rect x="51" y="58" width="15" height="26" rx="4" fill="#1C2B4E"/>
  <rect x="30" y="58" width="5" height="26" rx="3" fill="#2A3F6A" opacity="0.5"/>
  <rect x="51" y="58" width="5" height="26" rx="3" fill="#2A3F6A" opacity="0.5"/>

  <!-- BELT -->
  <rect x="27" y="55" width="42" height="6" rx="2" fill="#3C2410"/>
  <rect x="44" y="54" width="8" height="8" rx="1" fill="#6A4820"/>
  <rect x="45" y="55" width="6" height="6" rx="1" fill="#523818"/>

  <!-- TORSO — tank top -->
  <rect x="26" y="30" width="44" height="28" rx="5" fill="#1E1E1E"/>
  <ellipse cx="37" cy="43" rx="9" ry="12" fill="#161616" opacity="0.45"/>
  <ellipse cx="59" cy="43" rx="9" ry="12" fill="#161616" opacity="0.45"/>
  <rect x="47" y="32" width="2" height="24" fill="#141414" opacity="0.4"/>
  <!-- Collar -->
  <path d="M38,30 Q48,35 58,30" stroke="#2A2A2A" stroke-width="2" fill="none"/>
  <!-- Straps -->
  <rect x="32" y="20" width="8" height="13" rx="3" fill="#1E1E1E"/>
  <rect x="56" y="20" width="8" height="13" rx="3" fill="#1E1E1E"/>

  <!-- LEFT ARM + FIST (leading punch) -->
  <rect x="6" y="28" width="21" height="24" rx="8" fill="#B87040"/>
  <rect x="6" y="28" width="7" height="24" rx="6" fill="#C88050" opacity="0.35"/>
  <rect x="5" y="50" width="19" height="14" rx="5" fill="#A05C30"/>
  <!-- Fist left -->
  <rect x="3" y="59" width="18" height="12" rx="4" fill="#8A3E1C"/>
  <rect x="4" y="61" width="15" height="2" rx="1" fill="#B06030" opacity="0.55"/>
  <rect x="4" y="64" width="15" height="2" rx="1" fill="#B06030" opacity="0.55"/>
  <rect x="4" y="67" width="15" height="2" rx="1" fill="#B06030" opacity="0.55"/>

