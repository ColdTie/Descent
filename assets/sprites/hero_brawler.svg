  <rect x="40" y="27" width="16" height="3.5" rx="1.5" fill="#6A2008"/>
  <ellipse cx="48" cy="29" rx="10" ry="3" fill="#A86030" opacity="0.25"/>

  <!-- Stubble -->
  <rect x="37" y="25" width="22" height="6" rx="3" fill="#1A0A02" opacity="0.18"/>

  <!-- Cheek bruise -->
  <ellipse cx="58" cy="20" rx="5" ry="3" fill="#4A2880" opacity="0.22"/>
