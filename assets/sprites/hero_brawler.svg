  <rect x="69" y="18" width="21" height="24" rx="8" fill="#B87040"/>
  <rect x="76" y="18" width="7" height="24" rx="6" fill="#C88050" opacity="0.35"/>
  <rect x="72" y="40" width="19" height="14" rx="5" fill="#A05C30"/>
  <!-- Fist right raised -->
  <rect x="74" y="28" width="18" height="12" rx="4" fill="#8A3E1C"/>
  <rect x="75" y="30" width="15" height="2" rx="1" fill="#B06030" opacity="0.55"/>
  <rect x="75" y="33" width="15" height="2" rx="1" fill="#B06030" opacity="0.55"/>
  <rect x="75" y="36" width="15" height="2" rx="1" fill="#B06030" opacity="0.55"/>

  <!-- NECK -->
  <rect x="40" y="20" width="16" height="12" rx="4" fill="#C07840"/>

  <!-- HEAD -->
  <ellipse cx="48" cy="13" rx="19" ry="17" fill="#C07840"/>
  <ellipse cx="56" cy="15" rx="10" ry="12" fill="#903C10" opacity="0.25"/>
  <ellipse cx="41" cy="10" rx="9" ry="8" fill="#D08850" opacity="0.25"/>

