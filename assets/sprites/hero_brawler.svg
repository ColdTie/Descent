  <ellipse cx="48" cy="22" rx="3.5" ry="3" fill="#A05C28"/>
  <circle cx="46.5" cy="23.5" r="1.3" fill="#783014" opacity="0.65"/>
  <circle cx="49.5" cy="23.5" r="1.3" fill="#783014" opacity="0.65"/>

