  <rect x="32" y="11" width="13" height="3.5" rx="1.5" fill="#0E0602" transform="rotate(-14,38,13)"/>
  <rect x="51" y="11" width="13" height="3.5" rx="1.5" fill="#0E0602" transform="rotate(14,58,13)"/>

