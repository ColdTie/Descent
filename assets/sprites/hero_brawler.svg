<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shadow -->
  <ellipse cx="32" cy="61" rx="16" ry="3.5" fill="#000" opacity="0.3"/>
  <!-- Hair -->
  <ellipse cx="32" cy="13" rx="12" ry="7" fill="#1C0E04"/>
  <!-- Head -->
  <circle cx="32" cy="20" r="11" fill="#C07840"/>
  <!-- Ears -->
  <ellipse cx="21" cy="20" rx="3" ry="3.5" fill="#A86428"/>
  <ellipse cx="43" cy="20" rx="3" ry="3.5" fill="#A86428"/>
  <!-- Brow ridge -->
  <rect x="23" y="15.5" width="8" height="2" rx="1" fill="#6A3810"/>
  <rect x="33" y="15.5" width="8" height="2" rx="1" fill="#6A3810"/>
  <!-- Eyes - squinting determined -->
  <ellipse cx="27" cy="18.5" rx="3.5" ry="2" fill="#1A0A04"/>
  <ellipse cx="37" cy="18.5" rx="3.5" ry="2" fill="#1A0A04"/>
  <!-- Nose -->
  <ellipse cx="32" cy="23" rx="2" ry="1.5" fill="#A06028"/>
  <!-- Mouth - stern set jaw -->
  <rect x="27" y="26" width="10" height="2" rx="1" fill="#7A3218"/>
  <!-- Neck -->
  <rect x="28" y="30" width="8" height="5" fill="#C07840"/>
  <!-- Tank top chest -->
  <rect x="18" y="35" width="28" height="18" rx="3" fill="#2A3A58"/>
  <!-- Pec shadow -->
  <ellipse cx="26" cy="40" rx="5" ry="4" fill="#324464" opacity="0.55"/>
  <ellipse cx="38" cy="40" rx="5" ry="4" fill="#324464" opacity="0.55"/>
  <!-- Left upper arm -->
  <rect x="8" y="35" width="10" height="13" rx="5" fill="#C07840"/>
  <!-- Right upper arm -->
  <rect x="46" y="35" width="10" height="13" rx="5" fill="#C07840"/>
  <!-- Left fist raised -->
  <rect x="7" y="27" width="11" height="10" rx="4" fill="#9A5828"/>
  <!-- Right fist raised -->
  <rect x="46" y="27" width="11" height="10" rx="4" fill="#9A5828"/>
  <!-- Knuckle lines left -->
  <line x1="8" y1="30" x2="16" y2="30" stroke="#C07840" stroke-width="1"/>
  <line x1="8" y1="33" x2="16" y2="33" stroke="#C07840" stroke-width="1"/>
  <!-- Knuckle lines right -->
  <line x1="48" y1="30" x2="56" y2="30" stroke="#C07840" stroke-width="1"/>
  <line x1="48" y1="33" x2="56" y2="33" stroke="#C07840" stroke-width="1"/>
  <!-- Belt -->
  <rect x="18" y="51" width="28" height="3" rx="1" fill="#5A4020"/>
  <rect x="30" y="50.5" width="4" height="4" rx="1" fill="#A07830"/>
  <!-- Pants -->
  <rect x="20" y="53" width="11" height="11" rx="2" fill="#283060"/>
  <rect x="33" y="53" width="11" height="11" rx="2" fill="#283060"/>
</svg>
