  <ellipse cx="40" cy="17" rx="6" ry="5" fill="#0E0602"/>
  <ellipse cx="40" cy="17" rx="4.5" ry="3.5" fill="#3A1806"/>
  <circle cx="40" cy="17" r="2.5" fill="#6A2E0A"/>
  <circle cx="40" cy="17" r="1.4" fill="#080402"/>
  <circle cx="39" cy="16" r="1" fill="#FFF" opacity="0.6"/>

  <ellipse cx="56" cy="17" rx="6" ry="5" fill="#0E0602"/>
  <ellipse cx="56" cy="17" rx="4.5" ry="3.5" fill="#3A1806"/>
  <circle cx="56" cy="17" r="2.5" fill="#6A2E0A"/>
  <circle cx="56" cy="17" r="1.4" fill="#080402"/>
  <circle cx="55" cy="16" r="1" fill="#FFF" opacity="0.6"/>

