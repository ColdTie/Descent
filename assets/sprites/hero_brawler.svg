  <ellipse cx="48" cy="2" rx="19" ry="9" fill="#1A0C04"/>
  <ellipse cx="32" cy="8" rx="8" ry="7" fill="#1A0C04"/>
  <ellipse cx="64" cy="9" rx="7" ry="6" fill="#1A0C04"/>
  <ellipse cx="48" cy="2" rx="11" ry="5" fill="#2A1408" opacity="0.5"/>

